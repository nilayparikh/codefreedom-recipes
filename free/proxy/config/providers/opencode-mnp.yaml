---
# ── OpenCode Zen Provider (MNP) ──────────────────────────────────────────────
# Free-tier models from OpenCode Zen.
# Set OPENCODE_ZEN_API_KEY_MNP to enable (optional — free tier may work without).
# ──────────────────────────────────────────────────────────────────────────────

model_list:
  # https://models.dev/models/xiaomi/mimo-v2.5
  # MiMo V2.5 — Xiaomi, 1M context, 131K output
  # Capabilities: reasoning, tools, temperature
  # Vision: YES
  - model_name: OCZ/MNP/MiMo-V2.5-FREE
    litellm_params: &opencode_zen_openai_params
      model: openai/mimo-v2.5-free
      api_base: os.environ/OPENCODE_ZEN_BASE_URL
      api_key: os.environ/OPENCODE_ZEN_API_KEY_MNP
      timeout: 300
      drop_params: true
      stream_options:
        include_usage: true
      extra_body:
        temperature: 0.0
        top_p: 1.0
        reasoning_effort: "high"

    model_info: &opencode_zen_openai_model_info
      id: "ocz-mnp-mimo-v2.5-free"
      provider: opencode-zen-free
      db_model: false
      supports_reasoning: true
      mode: chat
      supports_system_messages: true
      supports_native_streaming: true
      supports_vision: true
      context_window: 1048576
      max_tokens: 1048576
      max_input_tokens: 917504
      max_output_tokens: 131072
      input_cost_per_token: 0
      output_cost_per_token: 0
      cache_read_input_token_cost: 0
      limit:
        context: 1048576
        output: 131072
      supported_openai_params:
        - tools
        - tool_choice
        - parallel_tool_calls
        - max_tokens
        - max_completion_tokens
        - stream
        - stream_options
        - temperature
        - top_p
        - stop
        - thinking
        - reasoning_effort
        - response_format
    codefreedom:
      plugins:
        reasoning-efforts:
          rule: ocz-mimo-v2-5

  - model_name: OCZ/MNP/Nemotron-3-Super-FREE
    litellm_params:
      <<: *opencode_zen_openai_params
      model: openai/nemotron-3-super-free
    model_info:
      <<: *opencode_zen_openai_model_info
      id: "ocz-mnp-nemotron-3-super-free"
      provider: opencode-zen-free
      supports_vision: false
      context_window: 262144
      max_tokens: 262144
      max_input_tokens: 131072
      max_output_tokens: 65536
      limit:
        context: 262144
        output: 65536
    codefreedom:
      plugins:
        reasoning-efforts:
          rule: ocz-nemotron-3-super

  - model_name: OCZ/MNP/Nemotron-3-Ultra-FREE
    litellm_params:
      <<: *opencode_zen_openai_params
      model: openai/nemotron-3-ultra-free
    model_info:
      <<: *opencode_zen_openai_model_info
      id: "ocz-mnp-nemotron-3-ultra-free"
      provider: opencode-zen-free
      supports_vision: true
      context_window: 1048576
      max_tokens: 1048576
      max_input_tokens: 917504
      max_output_tokens: 131072
      limit:
        context: 1048576
        output: 131072
    codefreedom:
      plugins:
        reasoning-efforts:
          rule: ocz-nemotron-3-ultra

  - model_name: OCZ/MNP/DeepSeek-V4-Flash-FREE
    litellm_params:
      <<: *opencode_zen_openai_params
      model: openai/deepseek-v4-flash-free
    model_info:
      <<: *opencode_zen_openai_model_info
      id: "ocz-mnp-deepseek-v4-flash-free"
      provider: opencode-zen-free
      supports_vision: false
      context_window: 1000000
      max_tokens: 1000000
      max_input_tokens: 616000
      max_output_tokens: 384000
      limit:
        context: 1000000
        output: 384000
    codefreedom:
      plugins:
        reasoning-efforts:
          rule: deepseek-v4-flash

  - model_name: OCZ/MNP/Big-Pickle
    litellm_params:
      <<: *opencode_zen_openai_params
      model: openai/big-pickle
    model_info:
      <<: *opencode_zen_openai_model_info
      id: "ocz-mnp-big-pickle"
      provider: opencode-zen-free
      supports_vision: false
      context_window: 262144
      max_tokens: 262144
      max_input_tokens: 131072
      max_output_tokens: 65536
      limit:
        context: 262144
        output: 65536
    codefreedom:
      plugins:
        reasoning-efforts:
          rule: ocz-big-pickle
