---
# ── OpenRouter Free Provider ──────────────────────────────────────────────────
# Free-tier models available through OpenRouter.
# Set OPENROUTER_API_KEY to enable (optional — some models work without a key).
# ──────────────────────────────────────────────────────────────────────────────

model_list:
  - model_name: OpenRouter/Nemotron-3-Ultra-550B-A55B
    litellm_params: &openrouter_params
      model: openrouter/nvidia/nemotron-3-ultra-550b-a55b:free
      api_base: os.environ/OPENROUTER_BASE_URL
      api_key: os.environ/OPENROUTER_API_KEY
      timeout: 300
      drop_params: true
      extra_body:
        stream_options:
          include_usage: true

    model_info: &openrouter_model_info
      id: "openrouter-nemotron-3-ultra-550b-a55b"
      mode: chat
      supports_system_messages: true
      supports_native_streaming: true
      supports_vision: true
      supported_openai_params: &openrouter_supported_openai_params
        - tools
        - tool_choice
        - parallel_tool_calls
        - response_format
        - max_tokens
        - max_completion_tokens
        - stream
        - stream_options
        - temperature
        - top_p
        - stop
        - reasoning_effort

    codefreedom:
      plugins:
        reasoning-efforts:
          rule: openrouter-nemotron-3-ultra
  - model_name: OpenRouter/FreeRouter
    litellm_params:
      <<: *openrouter_params
      model: openrouter/openrouter/free

    model_info:
      <<: *openrouter_model_info
      id: "openrouter-freerouter"
      supported_openai_params: &openrouter_freerouter_supported_openai_params
        - tools
        - tool_choice
        - parallel_tool_calls
        - response_format
        - max_tokens
        - max_completion_tokens
        - stream
        - stream_options
        - temperature
        - top_p
        - stop
    codefreedom:
      plugins:
        reasoning-efforts:
          rule: openrouter-freerouter
