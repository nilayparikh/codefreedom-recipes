---
# ── OpenCode Zen Provider (NPG) ──────────────────────────────────────────────
# Free-tier and GO subscription models from OpenCode Zen.
# Set OPENCODE_ZEN_API_KEY_NPG to enable.
#
# This file includes both:
#   - OCZ/NPG/* — free-tier models (no subscription needed)
#   - OCG/NPG/* — GO subscription models (subscription required)
# ──────────────────────────────────────────────────────────────────────────────

model_list:
  # ── Free-tier models (OCZ) ──────────────────────────────────────────────────

  # https://models.dev/models/xiaomi/mimo-v2.5
  # MiMo V2.5 — Xiaomi, 1M context, 131K output
  # Capabilities: reasoning, tools, temperature
  # Vision: YES
  - model_name: OCZ/NPG/MiMo-V2.5-FREE
    litellm_params: &opencode_zen_openai_params
      model: openai/mimo-v2.5-free
      api_base: os.environ/OPENCODE_ZEN_BASE_URL
      api_key: os.environ/OPENCODE_ZEN_API_KEY_NPG
      timeout: 300
      drop_params: true
      stream_options:
        include_usage: true
      extra_body:
        temperature: 0.0
        top_p: 1.0
        reasoning_effort: "high"

    model_info: &opencode_zen_openai_model_info
      id: "ocz-npg-mimo-v2.5-free"
      provider: opencode-zen-free
      db_model: false
      supports_reasoning: true
      mode: chat
      supports_system_messages: true
      supports_native_streaming: true
      supports_vision: true
      context_window: 1048576
      max_tokens: 1048576
      max_input_tokens: 917504
      max_output_tokens: 131072
      input_cost_per_token: 0
      output_cost_per_token: 0
      cache_read_input_token_cost: 0
      limit:
        context: 1048576
        output: 131072
      supported_openai_params:
        - tools
        - tool_choice
        - parallel_tool_calls
        - max_tokens
        - max_completion_tokens
        - stream
        - stream_options
        - temperature
        - top_p
        - stop
        - thinking
        - reasoning_effort
        - response_format
    codefreedom:
      plugins:
        reasoning-efforts:
          rule: ocz-mimo-v2-5

  - model_name: OCZ/NPG/Nemotron-3-Super-FREE
    litellm_params:
      <<: *opencode_zen_openai_params
      model: openai/nemotron-3-super-free
    model_info:
