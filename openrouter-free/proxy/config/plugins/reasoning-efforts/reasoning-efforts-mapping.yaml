# ── CodeFreedom reasoning-efforts mapping v2 ────────────────────────────
# Rule-based reasoning-effort translation for the LiteLLM proxy.
#
# THIS IS THE RECIPE-SPECIFIC VERSION for OpenRouter free-tier.
# Only rules referenced by models in providers/openrouter.yaml are included.
# For the full rule library, see the _default recipe.
# ─────────────────────────────────────────────────────────────────────────────

rules:
  # ── OpenRouter free-tier ──────────────────────────────────────────────

  openrouter-freerouter:
    type: mapping
    output: reasoning_effort
    values:
      none: none
      low: none
      medium: none
      high: none
      xhigh: none
      max: none

  openrouter-nemotron-3-ultra:
    type: mapping
    output: reasoning_effort
    values:
      none: none
      low: low
      medium: medium
      high: high
      xhigh: high
      max: high
