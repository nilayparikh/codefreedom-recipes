---
# ── Recipe: opencode-free ─────────────────────────────────────────────────────
# OpenCode Zen free-tier models via LiteLLM proxy.
# Extends _default for shared profiles, compose, and proxy config.
#
# This recipe adds:
#   - Claude Code profile with OpenCode Zen model aliases
#   - Proxy provider config for OpenCode Zen free-tier models
#   - Slimmed reasoning-efforts mapping (5 rules only)
# ──────────────────────────────────────────────────────────────────────────────

name: opencode-free
extends: _default
description: "OpenCode Zen free-tier models via LiteLLM proxy"
version: 1

files:
  # ── Proxy config (recipe-specific) ──────────────────────────────────────
  - path: .env.proxy
    target: .env.proxy
    merge: env
  - path: .env.proxy.secrets
    target: .env.proxy.secrets
    merge: env

  # ── Claude Code profile (recipe-specific model aliases) ─────────────────
  - path: profiles/claude-code.yaml
    target: profiles/claude-code.yaml
    merge: deepdiff

  # ── Proxy provider ─────────────────────────────────────────────────────
  - path: proxy/config/providers/opencode.yaml
    target: proxy/config/providers/opencode.yaml
    merge: deepdiff

  # ── Compose override (adds OpenCode Zen env vars) ──────────────────────
  - path: proxy/docker-compose.yaml
    target: proxy/docker-compose.yaml
    merge: deepdiff

  # ── Config override (adds provider include) ────────────────────────────
  - path: proxy/config/config.yaml
    target: proxy/config/config.yaml
    merge: deepdiff

  # ── Slimmed reasoning-efforts (5 opencode-free rules) ─────────────────
  - path: proxy/config/plugins/reasoning-efforts/reasoning-efforts-mapping.yaml
    target: proxy/config/plugins/reasoning-efforts/reasoning-efforts-mapping.yaml
    merge: deepdiff

dirs:
  # Host mount directories for embedded PostgreSQL (docker-compose.yaml
  # volume binds these paths).  Must exist before `docker compose up`
  # runs so that a subsequent permission fix (e.g. `chown 1000:1000`)
  # can set the correct owner for the in-container 'codefreedom' user.
  - pg/data
  - pg/backup

required_secrets:
  - var: OPENCODE_ZEN_API_KEY
    prompt: "OpenCode Zen API key"
    hint: "Get free key at https://opencode.ai/zen"
  - var: LITELLM_MASTER_KEY
    prompt: "LiteLLM proxy master key"
    hint: "Run: openssl rand -hex 32  (default: sk-codefreedom-local)"
    default: "sk-codefreedom-local"

optional_config:
  - var: LITELLM_MODEL_ALIAS_BEST
    default: "OpenCode/MiMo-V2.5-FREE"
  - var: LITELLM_MODEL_ALIAS_FABLE
    default: "OpenCode/MiMo-V2.5-FREE"
  - var: LITELLM_MODEL_ALIAS_SONNET
    default: "OpenCode/DeepSeek-V4-Flash-FREE"
  - var: LITELLM_MODEL_ALIAS_OPUS
    default: "OpenCode/MiMo-V2.5-FREE"
  - var: LITELLM_MODEL_ALIAS_HAIKU
    default: "OpenCode/Nemotron-3-Ultra-FREE"
  - var: LITELLM_MODEL_ALIAS_SONNET_1M
    default: "OpenCode/DeepSeek-V4-Flash-FREE"
  - var: LITELLM_MODEL_ALIAS_OPUS_1M
    default: "OpenCode/MiMo-V2.5-FREE"
  - var: LITELLM_MODEL_ALIAS_OPUSPLAN
    default: "OpenCode/MiMo-V2.5-FREE"
