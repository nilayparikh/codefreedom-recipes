---
# ── OpenCode Zen Provider ────────────────────────────────────────────────────
# Free-tier models from OpenCode Zen.
# Set OPENCODE_ZEN_API_KEY to enable.
# ──────────────────────────────────────────────────────────────────────────────

model_list:
  # https://models.dev/models/xiaomi/mimo-v2.5
  # MiMo V2.5 — Xiaomi, 1M context, 131K output
  # Capabilities: reasoning, tools, temperature
  # Vision: YES — models.dev shows Image icon (data-tooltip="Image")
  - model_name: OpenCode/MiMo-V2.5-FREE
    litellm_params: &opencode_zen_openai_params
      model: openai/mimo-v2.5-free
      api_base: os.environ/OPENCODE_ZEN_BASE_URL
      api_key: os.environ/OPENCODE_ZEN_API_KEY
      timeout: 300
      drop_params: true
      stream_options:
        include_usage: true
      extra_body:
        temperature: 0.0
        top_p: 1.0
        reasoning_effort: "high"
    model_info: &opencode_zen_openai_model_info
      id: "ocz-npg-mimo-v2.5-free"
      provider: opencode-zen-free
      db_model: false
      supports_reasoning: true
      mode: chat
      supports_system_messages: true
      supports_native_streaming: true
      supports_vision: true
      context_window: 1048576
      max_tokens: 1048576
      max_input_tokens: 917504
      max_output_tokens: 131072
      input_cost_per_token: 0
      output_cost_per_token: 0
      cache_read_input_token_cost: 0
      limit:
        context: 1048576
        output: 131072
      supported_openai_params:
        - tools
        - tool_choice
        - parallel_tool_calls
        - max_tokens
        - max_completion_tokens
        - stream
        - stream_options
        - temperature
        - top_p
        - stop
        - thinking
        - reasoning_effort
        - response_format
    codefreedom:
      plugins:
        reasoning-efforts:
          rule: ocz-mimo-v2-5

  # Nemotron-3-Super — NVIDIA-backed, strong coding
  # Spec not independently verified on models.dev; using conservative defaults
  # based on Nemotron-3-Ultra specs (same family).
  # Vision: NO — Nemotron models are text-only (no vision on models.dev)
  - model_name: OpenCode/Nemotron-3-Super-FREE
    litellm_params:
      <<: *opencode_zen_openai_params
      model: openai/nemotron-3-super-free
    model_info:
      <<: *opencode_zen_openai_model_info
      id: "ocz-npg-nemotron-3-super-free"
      provider: opencode-zen-free
      supports_vision: false
      # Conservative: same as Ultra but smaller
      context_window: 262144
      max_tokens: 262144
      max_input_tokens: 131072
      max_output_tokens: 65536
      limit:
        context: 262144
        output: 65536
    codefreedom:
      plugins:
        reasoning-efforts:
          rule: ocz-nemotron-3-super

  # https://models.dev/models/deepseek/deepseek-v4-flash
  # DeepSeek V4-Flash — 1M context, 384K output
  # Capabilities: reasoning, tools, thinking, temperature
  # Vision: NO — models.dev shows no Image icon
  - model_name: OpenCode/Nemotron-3-Ultra-FREE
    litellm_params:
      <<: *opencode_zen_openai_params
      model: openai/nemotron-3-ultra-free
    model_info:
      <<: *opencode_zen_openai_model_info
      id: "ocz-npg-nemotron-3-ultra-free"
      provider: opencode-zen-free
      supports_vision: true
      context_window: 1048576
      max_tokens: 1048576
      max_input_tokens: 917504
      max_output_tokens: 131072
      limit:
        context: 1048576
        output: 131072
    codefreedom:
      plugins:
        reasoning-efforts:
          rule: ocz-nemotron-3-ultra

  # https://models.dev/models/deepseek/deepseek-v4-flash
  # DeepSeek V4-Flash — 1M context, 384K output
  # Capabilities: reasoning, tools, thinking, temperature
  # Vision: NO — models.dev shows no Image icon
  - model_name: OpenCode/DeepSeek-V4-Flash-FREE
    litellm_params:
      <<: *opencode_zen_openai_params
      model: openai/deepseek-v4-flash-free
    model_info:
      <<: *opencode_zen_openai_model_info
      id: "ocz-npg-deepseek-v4-flash-free"
      provider: opencode-zen-free
      supports_vision: false
      context_window: 1000000
      max_tokens: 1000000
      max_input_tokens: 616000
      max_output_tokens: 384000
      limit:
        context: 1000000
        output: 384000
    codefreedom:
      plugins:
        reasoning-efforts:
          rule: deepseek-v4-flash

  # Big Pickle — general purpose, reasoning + tools
  # Spec not independently verified on models.dev; using conservative defaults
  # Vision: NO — text-only model (no vision data found)
  - model_name: OpenCode/Big-Pickle
    litellm_params:
      <<: *opencode_zen_openai_params
      model: openai/big-pickle
    model_info:
      <<: *opencode_zen_openai_model_info
      id: "ocz-npg-big-pickle"
      provider: opencode-zen-free
      supports_vision: false
      # Conservative: similar to mid-tier models
      context_window: 262144
      max_tokens: 262144
      max_input_tokens: 131072
      max_output_tokens: 65536
      limit:
        context: 262144
        output: 65536
    codefreedom:
      plugins:
        reasoning-efforts:
          rule: ocz-big-pickle
