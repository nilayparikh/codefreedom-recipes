# ── CodeFreedom reasoning-efforts mapping v2 ────────────────────────────
# Rule-based reasoning-effort translation for the LiteLLM proxy.
#
# THIS IS THE RECIPE-SPECIFIC VERSION for opencode-free.
# Only rules referenced by models in providers/opencode.yaml are included.
# For the full rule library, see the bundled examples at:
#   src/codefreedom/examples/proxy/config/plugins/reasoning-efforts/
#
# Two rule types:
#
#   mapping — maps reasoning-level strings from upstream apps
#   (Claude Code, Cursor, etc.) to values the downstream model
#   accepts.  The ``values`` dict is a direct incoming→outgoing map.
#
#   thinking_budget — maps reasoning-level strings to a numeric
#   thinking-token budget.  The ``field`` is a dotted path
#   (e.g. ``extra_body.max_thinking_tokens``) that determines where
#   in the request the value gets set.
#
# A model may be associated with exactly ONE rule (by name or inline).
# If a model has no rule the plugin does a pure field rename
# (``output_config.effort`` ↔ ``reasoning_effort``) — the ``auto``
# default.
#
# To reference a rule from a provider/model entry:
#
#     - model_name: OpenCode/DeepSeek-V4-Flash-FREE
#       codefreedom:
#         plugins:
#           reasoning-efforts:
#             rule: deepseek-v4-flash       # ← name from this file
#
# The plugin reads this file at
# ``~/.codefreedom/proxy/config/plugins/reasoning-efforts/reasoning-efforts-mapping.yaml``.
# ─────────────────────────────────────────────────────────────────────────────

rules:
  # ── OpenCode Zen free-tier models ─────────────────────────────────────
  # All use the OpenAI reasoning_effort surface.

  ocz-mimo-v2-5:
    type: mapping
    output: reasoning_effort
    values:
      none: none
      low: low
      medium: medium
      high: high
      xhigh: high
      max: high

  ocz-nemotron-3-ultra:
    type: mapping
    output: reasoning_effort
    values:
      none: none
      low: low
      medium: medium
      high: high
      xhigh: high
      max: high

  ocz-nemotron-3-super:
    type: mapping
    output: reasoning_effort
    values:
      none: none
      low: none
      medium: none
      high: none
      xhigh: none
      max: none

  ocz-big-pickle:
    type: mapping
    output: reasoning_effort
    values:
      none: none
      low: none
      medium: none
      high: none
      xhigh: none
      max: none

  # ── DeepSeek V4 Flash (OpenCode Zen free tier) ────────────────────────

  deepseek-v4-flash:
    type: mapping
    output: reasoning_effort
    values:
      none: none
      low: high
      medium: high
      high: high
      xhigh: high
      max: high
