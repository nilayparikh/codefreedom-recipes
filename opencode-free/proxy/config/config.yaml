# ── OpenCode Zen — provider include ──────────────────────────────────────────
# DeepDiff-merged into the _default config.yaml on install.
# Adds the OpenCode Zen provider to the model list.
# ──────────────────────────────────────────────────────────────────────────────

include:
  - providers/opencode.yaml
    # ── Uncomment the next line to enable transparent WebSearch replacement
    #    via the local Camoufox MCP. See docs/proxy/websearch-interception.md.
    - websearch_interception
    # ── Reasoning-efforts mapping ─────────────────────────────────────────
    # Custom plugin that normalises output_config.effort (Anthropic) and
    # reasoning_effort (OpenAI / DeepSeek) across providers. The plugin
    # lives at config/plugins/reasoning-efforts/ and reads its
    # table from config/plugins/reasoning-efforts/reasoning-efforts-mapping.yaml.
    # Note the lowercase `instance` -- LiteLLM's callback loader stores
    # whatever `getattr(module, name)` returns, so a module-level singleton
    # instance (not the class) is what we reference here.
    - plugins.reasoning-efforts.reasoning_efforts_mapping.instance

  websearch_interception_params:
    enabled_providers:
      [
        "openai",
        "anthropic",
        "vertex_ai",
        "bedrock",
        "azure",
        "deepseek",
        "nvidia",
        "opencode",
        "openrouter",
        "minimax",
      ]
  search_tool_name: codefreedom-web

  # Require auth for the /metrics/ endpoint (set to true for production)
  require_auth_for_metrics_endpoint: os.environ/LITELLM_REQUIRE_AUTH_METRICS

# ═══════════════════════════════════════════════════════════════════════════════
# Web Search Bridge — SearXNG-shaped provider for the Camoufox MCP
# ═══════════════════════════════════════════════════════════════════════════════
# Uncomment this entire block to make LiteLLM's websearch_interception
# callback route every Claude Code WebSearch to the local web-bridge, which
# in turn calls the Camoufox MCP web_search tool. See
# docs/proxy/websearch-interception.md.

search_tools:
  - search_tool_name: codefreedom-web
    litellm_params:
      search_provider: searxng
      # Reachable on the shared 'codefreedom' Docker network.
      api_base: http://web-bridge:8500
