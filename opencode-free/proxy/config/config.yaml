# ── LiteLLM Example Configuration ─────────────────────────────────────────────
# This is the example config for codefreedom. Copy it to start:
#
#   cp -r litellm.examples/config litellm/
#
# Then customize litellm/config/config.yaml and providers/ for your setup.
# ──────────────────────────────────────────────────────────────────────────────
# Key concepts:
#   model_group_alias  → maps CodeFreedom/ names to specific provider models
#   drop_params: true   → strips unsupported params before forwarding
#   callbacks: prometheus → exposes LiteLLM metrics at /metrics/
#
# Provider fragments live under providers/. Each YAML file defines model_list
# entries for a specific provider. YAML anchors do NOT span files.
# ──────────────────────────────────────────────────────────────────────────────
# ── DISABLING PROVIDERS ─────────────────────────────────────────────────────
# Comment out any include line below to disable that provider entirely.
# Cloud-only users: comment out providers/local.yaml
# Local-only users: comment out all cloud providers, keep only local.yaml
# ──────────────────────────────────────────────────────────────────────────────

include:
  # ── OpenCode Zen ─────────────────────────────────────────────────────────
  # The sole provider for this recipe. Set OPENCODE_ZEN_API_KEY in
  # .env.proxy.secrets to activate.
  - providers/opencode.yaml

# ═══════════════════════════════════════════════════════════════════════════════
# General Settings
# ═══════════════════════════════════════════════════════════════════════════════
general_settings:
  # ── Database ─────────────────────────────────────────────────────────────
  store_model_in_db: false
  store_prompts_in_spend_logs: false

  # ── Forward Client Headers ───────────────────────────────────────────────
  forward_client_headers_to_llm_api: true

# ═══════════════════════════════════════════════════════════════════════════════
# Router Settings
# ═══════════════════════════════════════════════════════════════════════════════
router_settings:
  num_retries: 5
  retry_after: 0
  allowed_fails: 3

  # ── Model Group Aliases ──────────────────────────────────────────────────
  # These CodeFreedom/ names are what Claude Code profiles reference.
  # Change the env vars in .env to point aliases to different providers.
  #
  # Example: route Pro to a local model instead of DeepSeek:
  #   LITELLM_MODEL_ALIAS_PRO="DGX/Qwen3.6-27B"
  # ──────────────────────────────────────────────────────────────────────────
  model_group_alias:
    # These are the main aliases that Claude Code profiles reference.
    "CodeFreedom/Ultra": os.environ/LITELLM_MODEL_ALIAS_ULTRA
    "CodeFreedom/Pro": os.environ/LITELLM_MODEL_ALIAS_PRO
    "CodeFreedom/Flash": os.environ/LITELLM_MODEL_ALIAS_FLASH
    "CodeFreedom/Air": os.environ/LITELLM_MODEL_ALIAS_AIR

    # Aliases for apps that required specific model names.
    "opus": os.environ/LITELLM_MODEL_ALIAS_ULTRA # alias opus to the same as Ultra
    "sonnet": os.environ/LITELLM_MODEL_ALIAS_PRO # alias sonnet to the same as Pro
    "haiku": os.environ/LITELLM_MODEL_ALIAS_FLASH # alias haiku to the same as Flash

  # ── Retry Policy ─────────────────────────────────────────────────────────
  retry_policy:
    AuthenticationErrorRetries: 0 # never retry bad credentials
    TimeoutErrorRetries: os.environ/LITELLM_TIMEOUT_ERROR_RETRIES
    RateLimitErrorRetries: os.environ/LITELLM_RATE_LIMIT_ERROR_RETRIES
    ContentPolicyViolationErrorRetries: 0 # never retry content violations
    InternalServerErrorRetries: os.environ/LITELLM_INTERNAL_ERROR_RETRIES

# ═══════════════════════════════════════════════════════════════════════════════
# LiteLLM Settings
# ═══════════════════════════════════════════════════════════════════════════════
litellm_settings:
  always_include_stream_usage: os.environ/LITELLM_STREAM_USAGE
  drop_params: os.environ/LITELLM_DROP_PARAMS
  redact_user_api_key_info: os.environ/LITELLM_REDACT_USER_API_KEY
  turn_off_message_logging: os.environ/LITELLM_TURN_OFF_MSG_LOGGING
  json_logs: os.environ/LITELLM_JSON_LOGS

  modify_params: true

  # Translate Anthropic /v1/messages format to OpenAI for non-Anthropic backends
  use_chat_completions_url_for_anthropic_messages: true

  # Expose Prometheus metrics at /metrics/
  callbacks:
    - prometheus
    # ── Uncomment the next line to enable transparent WebSearch replacement
    #    via the local Camoufox MCP. See docs/proxy/websearch-interception.md.
    - websearch_interception
    # ── Reasoning-efforts mapping ─────────────────────────────────────────
    # Custom plugin that normalises output_config.effort (Anthropic) and
    # reasoning_effort (OpenAI / DeepSeek) across providers. The plugin
    # lives at config/plugins/reasoning-efforts/ and reads its
    # table from config/plugins/reasoning-efforts/reasoning-efforts-mapping.yaml.
    # Note the lowercase `instance` -- LiteLLM's callback loader stores
    # whatever `getattr(module, name)` returns, so a module-level singleton
    # instance (not the class) is what we reference here.
    - plugins.reasoning-efforts.reasoning_efforts_mapping.instance

  websearch_interception_params:
    enabled_providers:
      [
        "openai",
        "anthropic",
        "vertex_ai",
        "bedrock",
        "azure",
        "deepseek",
        "nvidia",
        "opencode",
        "openrouter",
        "minimax",
      ]
  search_tool_name: codefreedom-web

  # Require auth for the /metrics/ endpoint (set to true for production)
  require_auth_for_metrics_endpoint: os.environ/LITELLM_REQUIRE_AUTH_METRICS

# ═══════════════════════════════════════════════════════════════════════════════
# Web Search Bridge — SearXNG-shaped provider for the Camoufox MCP
# ═══════════════════════════════════════════════════════════════════════════════
# Uncomment this entire block to make LiteLLM's websearch_interception
# callback route every Claude Code WebSearch to the local web-bridge, which
# in turn calls the Camoufox MCP web_search tool. See
# docs/proxy/websearch-interception.md.

search_tools:
  - search_tool_name: codefreedom-web
    litellm_params:
      search_provider: searxng
      # Reachable on the shared 'codefreedom' Docker network.
      api_base: http://web-bridge:8500
