---
# ── LiteLLM Proxy (CodeFreedom image) ───────────────────────────────────────
# Self-contained LiteLLM deployment for codefreedom.
#
# IMAGE:  Uses the published codefreedom:litellm-latest image (also
#         available on ghcr.io/nilayparikh/codefreedom as a mirror).
#         The image bakes in the WebSearch count display patch — no
#         entrypoint wrapper, no runtime mutation, no surprises.
#         Override LITELLM_IMAGE in .env.proxy to use a different tag
#         (e.g. a locally-built `codefreedom:litellm-local`).
#
# DATABASE: Embedded PostgreSQL 18.4 inside the image.
#   The image ships its own stripped PG (Unix-socket only, no TCP listener).
#   The entrypoint auto-initialises the cluster, runs `prisma db push`,
#   and sets DATABASE_URL=postgresql://litellm@/litellm?host=/var/run/postgresql
#   before exec'ing litellm. NO user configuration is needed for the
#   embedded PG — just provide a host directory for the data + socket
#   bind mounts below (the codefreedom proxy init helper creates them
#   at ~/.codefreedom/pg/{data,backup,socket} with ownership uid 1000).
#   To point at an EXTERNAL PG instead, set DATABASE_URL in .env.proxy
#   and remove the three PG volume mounts below.
#
# ── DISABLING PROVIDERS ───────────────────────────────────────────────────
# To disable a provider, comment out or remove its env vars below.
# Cloud-only users: remove the LOCAL_M_* and LOCAL_S_* blocks.
# Local-only users: remove all cloud provider blocks, keep only local.
# LiteLLM will skip any provider whose API key is empty, but removing
# env vars from this file keeps it cleaner. See docs/configuration.md.
# ───────────────────────────────────────────────────────────────────────────

name: codefreedom

services:
  litellm:
    image: ${LITELLM_IMAGE:-docker.io/nilayparikh/codefreedom:litellm-latest}
    container_name: ${LITELLM_CONTAINER_NAME:-litellm-codefreedom}
    restart: unless-stopped
    profiles:
      - litellm
      - all
    labels:
      "codefreedom.component": "litellm-proxy"
    # Entrypoint is tini -> litellm (set in the image). The compose
    # file just passes the config path and port through. `--port` and
    # `--host` are passed as args (not the LITELLM_PORT env var) so
    # they always win over the image's CMD defaults.
    command:
      - --config
      - /app/litellm-config/config.yaml
      - --port
      - "${LITELLM_PORT:-4000}"
      - --host
      - "0.0.0.0"
    ports:
      - "${LITELLM_BIND_HOST:-0.0.0.0}:${LITELLM_PORT:-4000}:${LITELLM_PORT:-4000}"
    extra_hosts:
      # Allows LiteLLM to reach local backends on host ports
      - host.docker.internal:host-gateway
    environment:
      # ── Auth ────────────────────────────────────────────────────────────
      # Docker Compose reads .env for ${VAR} interpolation (lowest priority).
      # System env vars override .env (highest priority).
      # .env.secrets is loaded at runtime by codefreedom CLI.
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-codefreedom-local}
      LITELLM_LOG_LEVEL: ${LITELLM_LOG_LEVEL:-INFO}

      # LiteLLM config flags
      NO_DOCS: ${LITELLM_NO_DOCS:-True}
      NO_REDOC: ${LITELLM_NO_REDOC:-True}

      # ── LiteLLM Router Settings ─────────────────────────────────────────
      LITELLM_NUM_RETRIES: ${LITELLM_NUM_RETRIES:-5}
      LITELLM_RETRY_AFTER: ${LITELLM_RETRY_AFTER:-0}
      LITELLM_TIMEOUT_ERROR_RETRIES: ${LITELLM_TIMEOUT_ERROR_RETRIES:-5}
      LITELLM_RATE_LIMIT_ERROR_RETRIES: ${LITELLM_RATE_LIMIT_ERROR_RETRIES:-5}
      LITELLM_INTERNAL_ERROR_RETRIES: ${LITELLM_INTERNAL_ERROR_RETRIES:-5}
      LITELLM_MODEL_ALIAS_ULTRA: ${LITELLM_MODEL_ALIAS_ULTRA:-DeepSeek/DeepSeek-V4-Pro}
      LITELLM_MODEL_ALIAS_PRO: ${LITELLM_MODEL_ALIAS_PRO:-DGX/Qwen3.6-27B}
      LITELLM_MODEL_ALIAS_FLASH: ${LITELLM_MODEL_ALIAS_FLASH:-DeepSeek/DeepSeek-V4-Flash}
      LITELLM_MODEL_ALIAS_AIR: ${LITELLM_MODEL_ALIAS_AIR:-DGX/Qwen3.6-35B-A3B}
      LITELLM_JSON_LOGS: ${LITELLM_JSON_LOGS:-true}
      LITELLM_DROP_PARAMS: ${LITELLM_DROP_PARAMS:-true}
      LITELLM_REDACT_USER_API_KEY: ${LITELLM_REDACT_USER_API_KEY:-true}
      LITELLM_REQUIRE_AUTH_METRICS: ${LITELLM_REQUIRE_AUTH_METRICS:-false}
      LITELLM_TURN_OFF_MSG_LOGGING: ${LITELLM_TURN_OFF_MSG_LOGGING:-false}
      LITELLM_STREAM_USAGE: ${LITELLM_STREAM_USAGE:-true}

      # ── Web Search Bridge ──────────────────────────────────────────────
      # The websearch_interception callback (in config.yaml) uses LiteLLM's
      # SearXNG search provider. The handler doesn't pass api_base from
      # litellm_params, so we set it as an env var for the SearXNG transformer.
      SEARXNG_API_BASE: ${SEARXNG_API_BASE:-http://web-bridge:8500}

      # ── OpenCode Zen ─────────────────────────────────────────────────────
      OPENCODE_ZEN_BASE_URL: ${OPENCODE_ZEN_BASE_URL:-https://opencode.ai/zen/v1}
      OPENCODE_ZEN_API_KEY: ${OPENCODE_ZEN_API_KEY:-}

    networks:
      - codefreedom
    volumes:
      - ./config:/app/litellm-config

      # ── Embedded PostgreSQL 18.4 (no TCP, Unix-socket only) ──────────
      # The entrypoint auto-initialises the cluster, generates the Prisma
      # client, pushes the schema, and exports DATABASE_URL pointing at
      # the Unix socket. No DATABASE_URL to set, no migrations to run.
      #
      # The host dirs must be owned by uid 1000 (the in-container
      # 'codefreedom' user). codefreedom proxy init creates them.
      # Override via .env.proxy: POSTGRES_HOST_DATA_DIR /
      # POSTGRES_HOST_BACKUP_DIR / POSTGRES_HOST_SOCKET_DIR.
      - ${POSTGRES_HOST_DATA_DIR:-${HOME}/.codefreedom/pg/data}:/var/lib/postgresql/data
      - ${POSTGRES_HOST_BACKUP_DIR:-${HOME}/.codefreedom/pg/backup}:/var/lib/postgresql/backup
      # /var/run/postgresql (PG's Unix socket dir) is intentionally NOT
      # bind-mounted.  The socket is pure in-process IPC, recreated on
      # every container start, and has no value persisting across
      # restarts.  The entrypoint creates the dir + chmod 700s it.
    # The WebSearch count display patch is baked into the image (see
    # docker/litellm/Dockerfile.LiteLLM). No volume mounts or entrypoint
    # wrappers needed here.

  # ── Web search bridge (SearXNG-shaped → MCP) ────────────────────────────
  # Replaces Claude Code's native WebSearch with calls to the local Camoufox
  # MCP web_search tool. Started together with the proxy via
  #   codefreedom proxy start
  # Reachable on the shared 'codefreedom' network at http://web-bridge:8500.
  # No host port published — the proxy reaches it via service DNS.
  # Set the two `websearch_interception` and `search_tools` blocks in
  # config.yaml to actually use it. See docs/proxy/websearch-interception.md.
  web-bridge:
    # Pre-built image. The codefreedom proxy CLI auto-builds it on first start
    # if missing (see codefreedom/cli/proxy.py:_ensure_web_bridge_image).
    # Default is the full Docker Hub reference so the local tag is directly
    # pushable — no retag step needed before `docker push`.
    # To build manually:
    #   docker build -t docker.io/nilayparikh/codefreedom:web-bridge \
    #     -f docker/web-bridge/Dockerfile.Bridge docker/web-bridge/
    image: ${WEB_BRIDGE_IMAGE:-docker.io/nilayparikh/codefreedom:web-bridge}
    container_name: ${WEB_BRIDGE_CONTAINER_NAME:-codefreedom-web-bridge}
    restart: unless-stopped
    profiles:
      - litellm
      - all
    labels:
      "codefreedom.component": "web-search-bridge"
    environment:
      # Address of the Camoufox MCP web_search endpoint. Default assumes
      # `codefreedom tools web` is running on the Docker host at port 8420.
      MCP_WEB_URL: ${MCP_WEB_URL:-http://host.docker.internal:8420/mcp}
      # Per-call cooldown in seconds. The bridge returns HTTP 429 if a
      # second /search arrives within this window. 2.0 is a good default
      # for typical Claude Code usage.
      WEB_BRIDGE_COOLDOWN_SECONDS: ${WEB_BRIDGE_COOLDOWN_SECONDS:-2.0}
      # Per-call MCP timeout. Should be larger than the MCP's own
      # cooldown (default 10s) plus browser-render time.
      MCP_TIMEOUT_SECONDS: ${MCP_TIMEOUT_SECONDS:-60}
    extra_hosts:
      - host.docker.internal:host-gateway
    networks:
      - codefreedom
    # No ports: — bridge is only reachable on the codefreedom network.

networks:
  codefreedom:
    name: codefreedom
    driver: bridge
