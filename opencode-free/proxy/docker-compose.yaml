---
# ── OpenCode Zen — overrides ──────────────────────────────────────────────────
# Adds OpenCode Zen environment variables to the base docker-compose.yaml.
# DeepDiff-merged into the _default compose on install.
# ──────────────────────────────────────────────────────────────────────────────

services:
  litellm:
    environment:
      OPENCODE_ZEN_BASE_URL: ${OPENCODE_ZEN_BASE_URL:-https://opencode.ai/zen/v1}
      OPENCODE_ZEN_API_KEY: ${OPENCODE_ZEN_API_KEY:-}
