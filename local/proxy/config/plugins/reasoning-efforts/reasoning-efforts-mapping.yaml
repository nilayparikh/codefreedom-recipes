# ── CodeFreedom reasoning-efforts mapping v2 ────────────────────────────
# Rule-based reasoning-effort translation for the LiteLLM proxy.
#
# THIS IS THE RECIPE-SPECIFIC VERSION for local inference.
# Only rules referenced by models in providers/local.yaml are included.
# For the full rule library, see the bundled examples at:
#   src/codefreedom/examples/proxy/config/plugins/reasoning-efforts/
# ─────────────────────────────────────────────────────────────────────────────

rules:
  # ── Local Qwen3.6-27B (port 8000) ──────────────────────────────────────
  # Primary coding/reasoning model. Uses thinking_budget to set
  # max_thinking_tokens based on reasoning level.

  local-qwen3-6-27b:
    type: thinking_budget
    field: extra_body.max_thinking_tokens
    values:
      none: 0
      low: 512
      medium: 1028
      high: 2048
      xhigh: 4096
      max: 8192

  # ── Local Qwen3.6-35B-A3B (port 8001) ──────────────────────────────────
  # Fast, vision-capable model. Uses mapping translation for reasoning_effort.

  local-qwen3-6-35b-a3b:
    type: mapping
    output: reasoning_effort
    values:
      none: none
      low: low
      medium: medium
      high: high
      xhigh: high
      max: high
