---
# ── Local inference — overrides ──────────────────────────────────────────────
# Adds local inference environment variables to the base docker-compose.yaml.
# DeepDiff-merged into the _default compose on install.
# ──────────────────────────────────────────────────────────────────────────────

services:
  litellm:
    environment:
      LOCAL_M_BASE_URL: ${LOCAL_M_BASE_URL:-http://host.docker.internal:8000/v1}
      LOCAL_M_API_KEY: ${LOCAL_M_API_KEY:-sk-dummy}
      LOCAL_S_BASE_URL: ${LOCAL_S_BASE_URL:-http://host.docker.internal:8001/v1}
      LOCAL_S_API_KEY: ${LOCAL_S_API_KEY:-sk-dummy}
