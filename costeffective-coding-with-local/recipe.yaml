# yaml-language-server: $schema=https://raw.githubusercontent.com/nilayparikh/codefreedom/recipe-branch/schema/recipe.schema.json
---
# ── Recipe: costeffective-coding-with-local ────────────────────────────────────────────────────────
# Coding configuration recipe — profiles, proxy config, and env files
# for cloud providers (DeepSeek, Azure, OpenCode, OpenRouter) plus local
# inference backends, routing through a LiteLLM proxy.
#
# Extends _default for shared tool profiles, compose, and base proxy config.
# ──────────────────────────────────────────────────────────────────────────────

name: costeffective-coding-with-local
extends: _default
description: "Cloud + local inference — DeepSeek, Azure, OpenCode, OpenRouter, and local backends via LiteLLM proxy"
version: 1

files:
  # ── Claude Code config (secrets only — config lives in profiles) ─────────
  - path: .env.claude.secrets
    target: .env.claude.secrets
    merge: env

  # ── Proxy config ────────────────────────────────────────────────────────
  - path: .env.proxy
    target: .env.proxy
    merge: env
  - path: .env.proxy.secrets
    target: .env.proxy.secrets
    merge: env

  # ── MiMoCode config (secrets only — config lives in profiles) ───────────
  - path: .env.mimo.secrets
    target: .env.mimo.secrets
    merge: env

  # ── OpenCode config (secrets only — config lives in profiles) ───────────
  - path: .env.opencode.secrets
    target: .env.opencode.secrets
    merge: env

  # ── Profiles ────────────────────────────────────────────────────────────
  - path: profiles/claude-code.yaml
    target: profiles/claude-code.yaml
    merge: deepdiff
  - path: profiles/mimo-code.yaml
    target: profiles/mimo-code.yaml
    merge: deepdiff
  - path: profiles/open-code.yaml
    target: profiles/open-code.yaml
    merge: deepdiff
  - path: profiles/chrome.yaml
    target: profiles/chrome.yaml
    merge: deepdiff
  - path: profiles/web.yaml
    target: profiles/web.yaml
    merge: deepdiff
  - path: profiles/github.yaml
    target: profiles/github.yaml
    merge: deepdiff
  - path: profiles/web-bridge.yaml
    target: profiles/web-bridge.yaml
    merge: deepdiff

  # ── Proxy compose ───────────────────────────────────────────────────────
  - path: proxy/docker-compose.yaml
    target: proxy/docker-compose.yaml
    merge: deepdiff
  - path: proxy/config/config.yaml
    target: proxy/config/config.yaml
    merge: deepdiff

  # ── Plugins ─────────────────────────────────────────────────────────────
  - path: proxy/config/plugins/reasoning-efforts/reasoning-efforts-mapping.yaml
    target: proxy/config/plugins/reasoning-efforts/reasoning-efforts-mapping.yaml
    merge: deepdiff

  # ── Proxy providers ─────────────────────────────────────────────────────
  - path: proxy/config/providers/deepseek.yaml
    target: proxy/config/providers/deepseek.yaml
    merge: deepdiff
  - path: proxy/config/providers/azure-foundry.yaml
    target: proxy/config/providers/azure-foundry.yaml
    merge: deepdiff
  - path: proxy/config/providers/opencode.yaml
    target: proxy/config/providers/opencode.yaml
    merge: deepdiff
  - path: proxy/config/providers/openrouter.yaml
    target: proxy/config/providers/openrouter.yaml
    merge: deepdiff
  - path: proxy/config/providers/local.yaml
    target: proxy/config/providers/local.yaml
    merge: deepdiff

  # ── Setup scripts ──────────────────────────────────────────────────────
  - path: scripts/setup-secrets.sh
    target: scripts/costeffective-coding-with-local/setup-secrets.sh
  - path: scripts/setup-secrets.ps1
    target: scripts/costeffective-coding-with-local/setup-secrets.ps1

dirs: []
  # PG data and backup both use Docker named volumes — no host
  # directories are needed.

required_secrets:
  - var: LITELLM_MASTER_KEY
    prompt: "LiteLLM proxy master key"
    hint: "Run: openssl rand -hex 32  (default: sk-codefreedom-local)"
    default: "sk-codefreedom-local"
  - var: MICROSOFT_FOUNDRY_API_KEY
    prompt: "Azure Foundry API key"
    hint: "Set in Azure AI Foundry portal"
  - var: OPENCODE_ZEN_API_KEY
    prompt: "OpenCode Zen API key"
    hint: "Get key from OpenCode dashboard"
  - var: OPENROUTER_API_KEY
    prompt: "OpenRouter API key"
    hint: "Get key at https://openrouter.ai/keys"
  - var: GITHUB_PERSONAL_ACCESS_TOKEN
    prompt: "GitHub personal access token"
    hint: "Get key at https://github.com/settings/tokens"
  - var: LOCAL_M_API_KEY
    prompt: "Local model key (primary)"
    hint: "Any non-empty value — local server does not validate"
  - var: LOCAL_S_API_KEY
    prompt: "Local model key (secondary)"
    hint: "Any non-empty value — local server does not validate"

config_vars:
  - var: MICROSOFT_FOUNDRY_API_BASE
    prompt: "Azure Foundry base URL"
    hint: "Azure AI Foundry workspace endpoint"

advice: |
  For interactive secret setup (recommended), run the assisted script:
    Bash:       bash {cf_dir}/scripts/costeffective-coding-with-local/setup-secrets.sh
    PowerShell: {cf_dir}\scripts\costeffective-coding-with-local\setup-secrets.ps1
  The script sets CF_CLI_* machine environment variables, persists them
  in your shell profile, and reports which services are configured.
