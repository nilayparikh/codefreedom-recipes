model_list:
  # https://models.dev/models/xiaomi/mimo-v2.5
  # MiMo V2.5 — Xiaomi, 1M context, 131K output
  # Capabilities: reasoning, tools, temperature
  # Vision: YES — models.dev shows Image icon (data-tooltip="Image")
  - model_name: CommandCode/Mimo-V2.5
    litellm_params: &opencode_zen_openai_params
      model: openai/xiaomi/mimo-v2.5
      api_base: os.environ/COMMAND_CODE_BASE_URL
      api_key: os.environ/COMMAND_CODE_API_KEY
      timeout: 300
      drop_params: true
      stream_options:
        include_usage: true
      extra_body:
        temperature: 0.0
        top_p: 1.0
        reasoning_effort: "high"
    model_info: &opencode_zen_openai_model_info
      id: "command-code-mimo-v2.5"
      provider: command-code
      db_model: false
      supports_reasoning: true
      mode: chat
      supports_system_messages: true
      supports_native_streaming: true
      supports_vision: true
      context_window: 1000000
      max_tokens: 1000000
      max_input_tokens: 616000
      max_output_tokens: 384000
      input_cost_per_token: 0.00000014
      output_cost_per_token: 0.00000028
      cache_read_input_token_cost: 0.0000000028
      limit:
        context: 1000000
        output: 384000
      supported_openai_params:
        - tools
        - tool_choice
        - parallel_tool_calls
        - max_tokens
        - max_completion_tokens
        - stream
        - stream_options
        - temperature
        - top_p
        - stop
        - thinking
        - reasoning_effort
        - response_format
    codefreedom:
      plugins:
        reasoning-efforts:
          rule: mimo-v2-5

