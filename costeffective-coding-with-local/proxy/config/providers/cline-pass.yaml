---
# ── Cline Pass Provider ───────────────────────────────────────────────────────
# Cline Pass — flat-fee subscription (~$9.99/mo) giving access to curated
# open-weight coding models through Cline's OpenAI-compatible API.
# Set CLINE_PASS_API_KEY to enable.
#
# Reference: https://docs.cline.bot/getting-started/clinepass
# Reference pricing (per 1M tokens) — ClinePass is a flat monthly subscription;
# these are the underlying API rates used for quota measurement.
#
# | MODEL | ID | INPUT | OUTPUT | CACHED READ | CACHED WRITE | VISION |
# |---|---|---|---|---|---|---|
# | GLM-5.2 | cline-pass/glm-5.2 | $1.40 | $4.40 | $0.26 | - | no |
# | Kimi K2.7 Code | cline-pass/kimi-k2.7-code | $0.95 | $4.00 | $0.19 | - | yes |
# | Kimi K2.6 | cline-pass/kimi-k2.6 | $0.95 | $4.00 | $0.16 | - | yes |
# | DeepSeek V4 Pro | cline-pass/deepseek-v4-pro | $1.74 | $3.48 | $0.0145 | - | no |
# | DeepSeek V4 Flash | cline-pass/deepseek-v4-flash | $0.14 | $0.28 | $0.0028 | - | no |
# | MiMo-V2.5 | cline-pass/mimo-v2.5 | $0.14 | $0.28 | $0.0028 | - | no |
# | MiMo-V2.5-Pro | cline-pass/mimo-v2.5-pro | $1.74 | $3.48 | $0.0145 | - | no |
# | MiniMax M3 | cline-pass/minimax-m3 | $0.30 | $1.20 | $0.06 | - | yes |
# | Qwen3.7 Max | cline-pass/qwen3.7-max | $2.50 | $7.50 | $0.50 | $3.125 | no |
# | Qwen3.7 Plus (≤ 256K tokens) | cline-pass/qwen3.7-plus | $0.40 | $1.60 | $0.04 | $0.50 | yes |
# | Qwen3.7 Plus (> 256K tokens) | cline-pass/qwen3.7-plus | $1.20 | $4.80 | $0.12 | $1.50 | yes |
#
# As of June 2026.
# ──────────────────────────────────────────────────────────────────────────────

cline_pass_api_params: &cline_pass_api_params
  api_base: os.environ/CLINE_PASS_BASE_URL
  api_key: os.environ/CLINE_PASS_API_KEY

cline_pass_params: &cline_pass_params
  drop_params: true
  stream_options:
    include_usage: true
  extra_body:
    temperature: 0.0
    top_p: 1.0
    reasoning_effort: "high"

cline_pass_model_info: &cline_pass_model_info
  db_model: false
  supports_reasoning: true
  mode: chat
  supports_system_messages: true
  supports_native_streaming: true
  supported_openai_params:
    - tools
    - tool_choice
    - parallel_tool_calls
    - max_tokens
    - max_completion_tokens
    - stream
    - stream_options
    - temperature
    - top_p
    - stop
    - thinking
    - reasoning_effort
    - response_format

# Cline Pass is a flat-rate subscription — use moderate cooldown so we
# fail over quickly on rate-limit bursts but don't churn on transient errors.
# Priority slot: 11 (see PROVIDER_ORDER.md). Order is configurable via CLINE_SUB_ROUTING_ORDER.
sub_model_routing_params: &sub_model_routing_params
  cooldown_time: 3600
  timeout: 120

model_list:
  # ── GLM-5.2 ───────────────────────────────────────────────────────────────
  - model_name: GLM-5.2
    litellm_params:
      model: openai/cline-pass/glm-5.2
      <<: [*cline_pass_api_params, *cline_pass_params, *sub_model_routing_params]
      order: os.environ/CLINE_SUB_ROUTING_ORDER
    model_info:
      id: "cline-pass-glm-5-2"
      custom_llm_provider: cline-pass
      <<: *cline_pass_model_info
      input_cost_per_token: 0.00000140
      output_cost_per_token: 0.00000440
      cache_read_input_token_cost: 0.00000026
      cache_creation_input_token_cost: 0
      supports_vision: false
      context_window: 1048576
      max_tokens: 131072
      max_input_tokens: 1048576
      max_output_tokens: 131072
      limit:
        context: 1048576
        output: 131072
    codefreedom:
      plugins:
        reasoning-efforts:
          rule: glm
        route-image-request:
          enabled: true

