---
# ── OpenRouter API Parameters ────────────────────────────────────────────────
openrouter_api_params: &openrouter_api_params
  api_base: os.environ/OPENROUTER_BASE_URL
  api_key: os.environ/OPENROUTER_API_KEY

openrouter_litellm_params: &openrouter_litellm_params
  drop_params: true
  stream_options:
    include_usage: true

extra_body: &openrouter_extra_body
  temperature: 0.0
  top_p: 1.0
  reasoning_effort: "high"

openrouter_model_info: &openrouter_model_info
  db_model: false
  supports_reasoning: true
  mode: chat
  supports_system_messages: true
  supports_native_streaming: true
  supported_openai_params:
    - tools
    - tool_choice
    - parallel_tool_calls
    - max_tokens
    - max_completion_tokens
    - stream
    - stream_options
    - temperature
    - top_p
    - stop
    - thinking
    - reasoning_effort
    - response_format

free_model_cost_params: &free_model_cost_params
  input_cost_per_token: 0
  output_cost_per_token: 0
  cache_read_input_token_cost: 0
  cache_creation_input_token_cost: 0

# Free models, with 12H cooldown after encountering rate limits.
free_model_routing_params: &free_model_routing_params
  cooldown_time: 43200
  order: 1
  timeout: 120

# Routing params for subscription models that we want to use more aggressively since they're more cost effective than the direct API after rate limiting on free models.
open_routing_params: &open_routing_params
  cooldown_time: 60
  order: 3
  timeout: 120

model_list:
  # OpenRouter API: https://openrouter.ai/deepseek/deepseek-v4-pro#api
  - model_name: DeepSeek-V4-Pro
    litellm_params:
      model: openrouter/deepseek/deepseek-v4-pro
      <<:
        [
          *openrouter_api_params,
          *openrouter_litellm_params,
          *open_routing_params,
        ]
      extra_body:
        <<: *openrouter_extra_body
        provider:
          only: ["deepseek"]
          allow_fallbacks: false
    model_info:
      id: "openrouter-deepseek-v4-pro"
      custom_llm_provider: openrouter
      <<: *openrouter_model_info
      input_cost_per_token: 0.000000435
      output_cost_per_token: 0.00000087
      cached_input_cost_per_token: 0.000000003625
      supports_vision: false
      context_window: 1000000
      max_tokens: 1000000
      max_input_tokens: 616000
      max_output_tokens: 384000
      limit:
        context: 1000000
        output: 384000
    codefreedom:
      plugins:
        reasoning-efforts:
          rule: deepseek-v4-pro

