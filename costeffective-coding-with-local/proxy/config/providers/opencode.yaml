        reasoning-efforts:
          rule: deepseek-v4-flash

  # Big Pickle — general purpose, reasoning + tools
  # Spec not independently verified on models.dev; using conservative defaults
  # Vision: NO — text-only model (no vision data found)
  - model_name: OpenCode/Big-Pickle
    litellm_params:
      <<: *opencode_openai_params
      model: openai/big-pickle
    model_info:
      <<: *opencode_openai_model_info
      id: "opencode-big-pickle"
      provider: opencode-zen-free
      supports_vision: false
      # Conservative: similar to mid-tier models
      context_window: 262144
      max_tokens: 262144
      max_input_tokens: 131072
      max_output_tokens: 65536
      limit:
        context: 262144
        output: 65536
    codefreedom:
      plugins:
        reasoning-efforts:
          rule: big-pickle

  # ── OpenCode Go Provider ────────────────────────────────────────────────────
  # Subscription models from OpenCode GO.
  # Set OPENCODE_ZEN_API_KEY to enable.
  #
  # GO has TWO API surfaces — some models are Anthropic-format, some OpenAI:
  #
  # Set OPENCODE_GO_BASE_URL to https://opencode.ai/zen/go/v1
  # LiteLLM's openai/ provider appends /chat/completions automatically.
  # ──────────────────────────────────────────────────────────────────────────────

  # ── Anthropic-format GO models ──────────────────────────────────────────────

  # https://models.dev/models/minimax/MiniMax-M3
  # MiniMax-M3 — 512K context, 128K output
  # Capabilities: reasoning, tools, temperature
  # Vision: YES — models.dev shows Image icon (data-tooltip="Image")
  - model_name: OpenCode/Minimax-M3
    litellm_params: &opencode_anthropic_params
      api_base: os.environ/OPENCODE_GO_ANTHROPIC_BASE_URL
      api_key: os.environ/OPENCODE_ZEN_API_KEY
      timeout: 300
      drop_params: true
      model: anthropic/minimax-m3
    model_info:
      <<: *opencode_openai_model_info
      id: "opencode-minimax-m3"
      provider: opencode-go
      supports_vision: true
      context_window: 512000
      max_tokens: 512000
      max_input_tokens: 384000
      max_output_tokens: 128000
      input_cost_per_token: 0.00000030
      output_cost_per_token: 0.00000120
      cache_read_input_token_cost: 0.00000006
      cache_creation_input_token_cost: 0
      limit:
        context: 512000
        output: 128000
    codefreedom:
      plugins:
        reasoning-efforts:
          rule: minimax-m3

  # https://models.dev/models/alibaba/qwen3.7-plus/
  # Capabilities: tools, reasoning, temperature
  # Text Only
  - model_name: OpenCode/Qwen3.7-Plus
    litellm_params:
      <<: *opencode_anthropic_params
      model: anthropic/qwen3.7-plus
    model_info:
      <<: *opencode_openai_model_info
      id: "opencode-qwen3-7-plus"
      provider: opencode-go
      supports_vision: false
      context_window: 512000
      max_tokens: 512000
      max_input_tokens: 384000
      max_output_tokens: 128000
      # Pricing: ≤ 256K tokens
      input_cost_per_token: 0.00000040
      output_cost_per_token: 0.00000160
      cache_read_input_token_cost: 0.00000004
      cache_creation_input_token_cost: 0.00000050
      # Pricing: > 256K tokens (beyond context window)
      input_cost_per_token_above_256k_tokens: 0.00000120
      output_cost_per_token_above_256k_tokens: 0.00000480
      cache_read_input_token_cost_above_272k_tokens: 0.00000012
      limit:
        context: 512000
        output: 128000
    codefreedom:
      plugins:
        reasoning-efforts:
          rule: qwen3-7-plus

