        ]
    model_info:
      <<: *opencode_openai_model_info
      id: "opencode-qwen3-7-plus"
      supports_vision: true
      tiered_pricing:
        - max_tokens: 256000
          input_cost_per_token: 0.00000032
          output_cost_per_token: 0.00000128
          cache_read_cost_per_token: 0.000000064
          cache_creation_cost_per_token: 0.00000040
        - max_tokens: 1000000
