---
# ── OpenCode Zen Provider ────────────────────────────────────────────────────
# Free-tier models from OpenCode Zen.
# Set OPENCODE_ZEN_API_KEY to enable.

# | MODEL | ID | INPUT | OUTPUT | CACHED READ | CACHED WRITE | OPENAI/ANTHROPIC |
# |---|---|---|---|---|---|---|
# | GLM-5.1 | glm-5.1 | $1.40 | $4.40 | $0.26 | - | OpenAI |
# | Kimi K2.6 | kimi-k2.6 | $0.95 | $4.00 | $0.16 | - | OpenAI |
# | MiMo V2.5 | mimo-v2.5 | $0.14 | $0.28 | $0.0028 | - | OpenAI |
# | MiMo V2.5 Pro | mimo-v2.5-pro | $1.74 | $3.48 | $0.0145 | - | OpenAI |
# | MiniMax M3 | minimax-m3 | $0.30 | $1.20 | $0.06 | - | Anthropic |
# | Qwen3.7 Max | qwen3.7-max | $2.50 | $7.50 | $0.50 | $3.125 | Anthropic |
# | Qwen3.7 Plus (≤ 256K tokens) | qwen3.7-plus | $0.40 | $1.60 | $0.04 | $0.50 | Anthropic |
# | Qwen3.7 Plus (> 256K tokens) | qwen3.7-plus | $1.20 | $4.80 | $0.12 | $1.50 | Anthropic |
# | DeepSeek V4 Pro | deepseek-v4-pro | $1.74 | $3.48 | $0.0145 | - | OpenAI |
# | DeepSeek V4 Flash | deepseek-v4-flash | $0.14 | $0.28 | $0.0028 | - | OpenAI |

# As of June 2026. See https://opencode.ai/docs/go/ for latest pricing and models.

# ──────────────────────────────────────────────────────────────────────────────

model_list:
  # https://models.dev/models/xiaomi/mimo-v2.5
  # MiMo V2.5 — Xiaomi, 1M context, 131K output
  # Capabilities: reasoning, tools, temperature
  # Vision: YES — models.dev shows Image icon (data-tooltip="Image")
  - model_name: OpenCode/MiMo-V2.5-FREE
    litellm_params: &opencode_openai_params
      model: openai/mimo-v2.5-free
      api_base: os.environ/OPENCODE_ZEN_BASE_URL
      api_key: os.environ/OPENCODE_ZEN_API_KEY
      timeout: 300
      drop_params: true
      stream_options:
        include_usage: true
      extra_body:
        temperature: 0.0
        top_p: 1.0
        reasoning_effort: "high"
    model_info: &opencode_openai_model_info
      id: "opencode-mimo-v2.5-free"
      db_model: false
      supports_reasoning: true
      mode: chat
      supports_system_messages: true
      supports_native_streaming: true
      supports_vision: true
      context_window: 1048576
      max_tokens: 1048576
      max_input_tokens: 917504
      max_output_tokens: 131072
      input_cost_per_token: 0
      output_cost_per_token: 0
      cache_read_input_token_cost: 0
      limit:
        context: 1048576
        output: 131072
      supported_openai_params:
        - tools
        - tool_choice
        - parallel_tool_calls
        - max_tokens
        - max_completion_tokens
        - stream
        - stream_options
        - temperature
        - top_p
        - stop
        - thinking
        - reasoning_effort
        - response_format
    codefreedom:
      plugins:
        reasoning-efforts:
          rule: mimo-v2-5

  # https://models.dev/models/deepseek/deepseek-v4-flash
  # DeepSeek V4-Flash — 1M context, 384K output
  # Capabilities: reasoning, tools, thinking, temperature
  # Vision: NO — models.dev shows no Image icon
  - model_name: OpenCode/Nemotron-3-Ultra-FREE
    litellm_params:
      <<: *opencode_openai_params
      model: openai/nemotron-3-ultra-free
    model_info:
      <<: *opencode_openai_model_info
      id: "opencode-nemotron-3-ultra-free"
      provider: opencode-zen-free
      supports_vision: true
      context_window: 1048576
      max_tokens: 1048576
      max_input_tokens: 917504
      max_output_tokens: 131072
      limit:
        context: 1048576
        output: 131072
    codefreedom:
      plugins:
        reasoning-efforts:
          rule: nemotron-3-ultra

  # https://models.dev/models/deepseek/deepseek-v4-flash
