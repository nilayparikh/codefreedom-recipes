      <<: [*opencode_openai_model_info, *free_model_cost_params]
      supports_vision: false
      context_window: 1000000
      max_tokens: 1000000
      max_input_tokens: 616000
      max_output_tokens: 384000
      limit:
        context: 1000000
        output: 384000
    codefreedom:
      plugins:
        reasoning-efforts:
          rule: deepseek-v4-flash

  # ── OpenCode Go Provider ────────────────────────────────────────────────────
