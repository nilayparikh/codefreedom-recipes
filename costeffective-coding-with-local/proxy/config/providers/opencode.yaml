    litellm_params:
      <<: *opencode_openai_params
      model: openai/deepseek-v4-flash-free
      litellm_provider: openai
      cooldown_time: 43200
      priority: 1
    model_info:
      <<: *opencode_openai_model_info
      id: "opencode-zen-deepseek-v4-flash-free"
      provider: opencode-zen-free
