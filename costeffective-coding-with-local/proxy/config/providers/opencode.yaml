---
# ── OpenCode Zen Provider ────────────────────────────────────────────────────
# Free-tier models from OpenCode Zen.
# Set OPENCODE_ZEN_API_KEY to enable.

# | MODEL | ID | INPUT | OUTPUT | CACHED READ | CACHED WRITE | OPENAI/ANTHROPIC |
# |---|---|---|---|---|---|---|
# | GLM-5.1 | glm-5.1 | $1.40 | $4.40 | $0.26 | - | OpenAI |
# | Kimi K2.6 | kimi-k2.6 | $0.95 | $4.00 | $0.16 | - | OpenAI |
# | MiMo V2.5 | mimo-v2.5 | $0.14 | $0.28 | $0.0028 | - | OpenAI |
# | MiMo V2.5 Pro | mimo-v2.5-pro | $1.74 | $3.48 | $0.0145 | - | OpenAI |
# | MiniMax M3 | minimax-m3 | $0.30 | $1.20 | $0.06 | - | Anthropic |
# | Qwen3.7 Max | qwen3.7-max | $2.50 | $7.50 | $0.50 | $3.125 | Anthropic |
# | Qwen3.7 Plus (≤ 256K tokens) | qwen3.7-plus | $0.40 | $1.60 | $0.04 | $0.50 | Anthropic |
# | Qwen3.7 Plus (> 256K tokens) | qwen3.7-plus | $1.20 | $4.80 | $0.12 | $1.50 | Anthropic |
# | DeepSeek V4 Pro | deepseek-v4-pro | $1.74 | $3.48 | $0.0145 | - | OpenAI |
# | DeepSeek V4 Flash | deepseek-v4-flash | $0.14 | $0.28 | $0.0028 | - | OpenAI |

# As of June 2026. See https://opencode.ai/docs/go/ for latest pricing and models.

# ──────────────────────────────────────────────────────────────────────────────

opencode_openai_zen_api_params: &opencode_openai_zen_api_params
  api_base: os.environ/OPENCODE_ZEN_BASE_URL
  api_key: os.environ/OPENCODE_ZEN_API_KEY

opencode_openai_go_api_params: &opencode_openai_go_api_params
  api_base: os.environ/OPENCODE_GO_BASE_URL
  api_key: os.environ/OPENCODE_ZEN_API_KEY

opencode_anthropic_go_api_params: &opencode_anthropic_go_api_params
  api_base: os.environ/OPENCODE_GO_ANTHROPIC_BASE_URL
  api_key: os.environ/OPENCODE_ZEN_API_KEY

opencode_params: &opencode_params
  drop_params: true
  stream_options:
    include_usage: true
  extra_body:
    temperature: 0.0
    top_p: 1.0
    reasoning_effort: "high"

opencode_openai_model_info: &opencode_openai_model_info
  db_model: false
  supports_reasoning: true
  mode: chat
  supports_system_messages: true
  supports_native_streaming: true
  supported_openai_params:
    - tools
    - tool_choice
    - parallel_tool_calls
    - max_tokens
    - max_completion_tokens
    - stream
    - stream_options
    - temperature
    - top_p
    - stop
    - thinking
    - reasoning_effort
    - response_format

free_model_cost_params: &free_model_cost_params
  input_cost_per_token: 0
  output_cost_per_token: 0
  cache_read_input_token_cost: 0
  cache_creation_input_token_cost: 0

# Free models, with 12H cooldown after encountering rate limits.
free_model_routing_params: &free_model_routing_params
  cooldown_time: 43200
  order: 1
  timeout: 120

# Routing params for subscription models that we want to use more aggressively since they're more cost effective than the direct API after rate limiting on free models.
sub_model_routing_params: &sub_model_routing_params
  cooldown_time: 60
  order: 2
  timeout: 120

model_list:
  # ── OpenCode ZEN Provider ────────────────────────────────────────────────────
  # Subscription models from OpenCode GO.
  # Set OPENCODE_ZEN_API_KEY to enable.
  #
  # GO has TWO API surfaces — some models are Anthropic-format, some OpenAI:
  #
  # Set OPENCODE_ZEN_BASE_URL to https://opencode.ai/zen/v1
  # LiteLLM's openai/ provider appends /chat/completions automatically.
  # ──────────────────────────────────────────────────────────────────────────────

  - model_name: MiMo-V2.5
    litellm_params:
      model: openai/mimo-v2.5-free
      <<:
        [
          *opencode_params,
          *opencode_openai_zen_api_params,
          *free_model_routing_params,
        ]
    model_info:
      id: "opencode-zen-mimo-v2.5-free"
      custom_llm_provider: opencode-zen-free
      <<: [*opencode_openai_model_info, *free_model_cost_params]
      supports_vision: false
      context_window: 1000000
      max_tokens: 1000000
      max_input_tokens: 870912
      max_output_tokens: 131000
      limit:
        context: 1000000
        output: 131000
    codefreedom:
      plugins:
        reasoning-efforts:
          rule: mimo-v2-5

  - model_name: DeepSeek-V4-Flash
    litellm_params:
      model: openai/deepseek-v4-flash-free
      <<:
        [
          *opencode_params,
          *opencode_openai_zen_api_params,
          *free_model_routing_params,
        ]
    model_info:
      id: "opencode-zen-deepseek-v4-flash-free"
