          output_cost_per_token: 0.00000384
          cache_read_cost_per_token: 0.000000192
          cache_creation_cost_per_token: 0.00000120
      context_window: 1000000
      max_tokens: 1000000
      max_input_tokens: 934000
      max_output_tokens: 66000
      limit:
        context: 1000000
        output: 66000
    codefreedom:
      plugins:
        reasoning-efforts:
          rule: qwen3-7-plus

