---
# ── Local Provider ───────────────────────────────────────────────────────────
# Generic local backend — routes to any OpenAI-compatible
# inference server running on the host machine.
#
# Two pre-configured models on separate ports.
#
# The model, api_base, and api_key all come from environment variables
# injected by docker-compose (LOCAL_M_* / LOCAL_S_*).
# Set LOCAL_M_API_KEY / LOCAL_S_API_KEY to enable each backend.
# ──────────────────────────────────────────────────────────────────────────────

model_list:
  - model_name: Qwen3.6-27B
    litellm_params: &local_params
      model: openai/qwen3.6_27b
      api_base: os.environ/LOCAL_M_BASE_URL
      api_key: os.environ/LOCAL_M_API_KEY
      timeout: 300
      include_reasoning: true
      max_tokens: 131072
      max_completion_tokens: 16384
      extra_body:
        seed: 42
        temperature: 0.0
        top_p: 1.0
        top_k: 1
        presence_penalty: 0.0
        repetition_penalty: 1.0
        max_thinking_tokens: 1536
        forward_compatibility: true
        stream_options:
          include_usage: true
        chat_template_kwargs:
          enable_thinking: true
          preserve_thinking: false
    model_info: &local_model_info
      id: "local-qwen3.6-27b"
      provider: barsana
      db_model: false
      supports_reasoning: true
      mode: chat
      context_window: 131072
      max_tokens: 131072
      max_input_tokens: 114688
      max_output_tokens: 16384
      limit:
        context: 131072
        output: 16384
      supports_system_messages: true
      supports_native_streaming: true
      supports_vision: false
      supported_openai_params:
        - tools
        - tool_choice
        - parallel_tool_calls
        - response_format
        - max_tokens
        - max_completion_tokens
        - stream
        - stream_options
        - temperature
        - top_p
        - stop
        - thinking
        - reasoning_effort
    codefreedom:
      plugins:
        reasoning-efforts:
          rule: qwen3-6-27b

  - model_name: Qwen3.6-35B-A3B
    litellm_params:
      <<: *local_params
      model: openai/qwen3.6_35b_a3b
      api_base: os.environ/LOCAL_S_BASE_URL
      api_key: os.environ/LOCAL_S_API_KEY
      max_tokens: 262144
      max_completion_tokens: 40960

      extra_body:
        seed: 42
        temperature: 0.0
        top_p: 1.0
        top_k: 1
        presence_penalty: 0.0
        repetition_penalty: 1.0
        max_thinking_tokens: 1536
        forward_compatibility: true
        stream_options:
          include_usage: true
        chat_template_kwargs:
          enable_thinking: true
          preserve_thinking: false
    model_info:
      <<: *local_model_info
      id: "local-qwen3.6-35b-a3b"
      supports_vision: true
      context_window: 262144
      max_tokens: 262144
      max_input_tokens: 221184
      limit:
        context: 262144
        output: 40960
    codefreedom:
      plugins:
        reasoning-efforts:
          rule: qwen3-6-35b-a3b
