description: MiMoCode profiles for codefreedom — cloud + local inference with
  0-click proxy auto-config. All models from DeepSeek, Azure, OpenCode,
  OpenRouter, and local backends are automatically available.
notes:
  - "In sandbox mode (--sandbox), each profile gets its own isolated
    ~/.codefreedom/mimo-code/sandbox/{profile}/ directory."
  - "'default' is the base profile — 'ultra', 'pro', 'flash', 'air',
    and 'ui-ux' inherit from it."
  - "'bare' is standalone: minimal profile with no model config, sandbox
    settings, or preferences."
  - "Proxy auto-config: on launch, mimo probes LITELLM_BASE_URL, fetches
    /v1/models, and generates a complete mimocode.json with all models."
  - "No API keys required in profiles — the proxy handles routing."
  - "sandbox_images maps to Docker image reference for --sandbox mode."
  - "Use sandbox.env to declare env vars that should only be forwarded in
    --sandbox mode."
  - "Use local.env to declare env vars that should only apply in native mode."
profiles:
  default:
    description:
      Base profile — 0-click proxy auto-config with all models from the
      running LiteLLM proxy. Other profiles inherit from this.
    sandbox_images:
      default: docker.io/nilayparikh/codefreedom:mimo-code
    tools:
      - web
    env:
      LITELLM_BASE_URL: http://localhost:4000
      PROXY_API_KEY: ${LITELLM_MASTER_KEY}
      MIMOCODE_DISABLE_AUTOUPDATE: "1"
      MIMOCODE_DISABLE_MODELS_FETCH: "1"
      MIMOCODE_DISABLE_CLAUDE_CODE: "1"
      MIMOCODE_MIMO_ONLY: "1"
    sandbox:
      env:
        IS_SANDBOX: "1"
        MIMOCODE_DISABLE_GIT: "0"
        GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_PERSONAL_ACCESS_TOKEN}
        GH_TOKEN: ${GH_TOKEN}
  bare:
    description: "Standalone — minimal: no model config, no proxy auto-config,
      no sandbox settings. Just the mimo binary."
    env:
      MIMOCODE_DISABLE_AUTOUPDATE: "1"
      MIMOCODE_DISABLE_CLAUDE_CODE: "1"
      MIMOCODE_MIMO_ONLY: "1"
  ultra:
    description: "Maximum capability profile — best available models from all
      providers via the proxy. Enables all experimental features
      including workflow tool and LSP tool."
    env:
      MIMOCODE_EXPERIMENTAL: "1"
      MIMOCODE_ENABLE_QUESTION_TOOL: "1"
      MIMOCODE_EXPERIMENTAL_WORKFLOW_TOOL: "1"
      MIMOCODE_EXPERIMENTAL_LSP_TOOL: "1"
  pro:
    description:
      "Production profile — optimized for production coding tasks with
      high-quality models and balanced feature set."
    env:
      MIMOCODE_PERMISSION: "build"
      MIMOCODE_DISABLE_DEFAULT_PLUGINS: "0"
  flash:
    description:
      "Speed-optimized profile — lightweight models for fast iterations.
      Disables heavy plugins and experimental features."
    env:
      MIMOCODE_DISABLE_DEFAULT_PLUGINS: "1"
      MIMOCODE_DISABLE_AUTOCOMPACT: "1"
      MIMOCODE_DISABLE_MODELS_FETCH: "1"
  air:
    description: "Minimal-resource profile — suitable for low-power devices or
      constrained environments. Minimizes background work."
    env:
      MIMOCODE_DISABLE_DEFAULT_PLUGINS: "1"
      MIMOCODE_DISABLE_AUTOCOMPACT: "1"
      MIMOCODE_DISABLE_MODELS_FETCH: "1"
      MIMOCODE_DISABLE_PRUNE: "1"
      MIMOCODE_DISABLE_LSP_DOWNLOAD: "1"
      MIMOCODE_DISABLE_TERMINAL_TITLE: "1"
      MIMOCODE_DISABLE_MOUSE: "1"
  ui-ux:
    description: >
      UI/UX design profile — optimized for frontend development, visual
      design, and design system work. Enables question tool for interactive
      design feedback and image attachment support.
    env:
      MIMOCODE_MAX_PROMPT_IMAGES: "20"
      MIMOCODE_ENABLE_QUESTION_TOOL: "1"
      MIMOCODE_EXPERIMENTAL: "1"
