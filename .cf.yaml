# .cf.yaml -- CodeFreedom project config
# This file is the single source of truth for project-level overrides.
# Each module adds its own top-level block here.

git:
      # Auto-detected modules (commented out if none found)
      # modules:
      #   - module_name

      # Use conventional commits (type(scope): description)
      conventional_commit: true

      # Sign commits with GPG
      signed_commit: true

      # LLM model for commit/PR message generation
      model: MiMo-V2.5

      # Custom templates (override defaults)
      templates:
            commit_message: "${type}(${scope}): ${description}"
            pr_title: "${type}(${scope}): ${description}"
            pr_description: |
                  ## Summary
                  ${summary}
                  ## Changes
                  ${changes}
                  ## Testing
                  ${testing}
