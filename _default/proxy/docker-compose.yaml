---
# ── LiteLLM Proxy (CodeFreedom image) — Base ────────────────────────────────
# Shared compose file used by all recipes. Recipe-specific env vars
# (provider URLs, API keys, model aliases) are injected via .env.proxy
# files and the `cf run proxy start` CLI.
#
# IMAGE: The published `codefreedom:litellm-latest` image is multi-arch
# (linux/arm64 + linux/amd64).  Keep this compose file free of a
# `platform:` pin so Docker can pull the matching manifest on Apple
# Silicon, Linux ARM, Intel/AMD Linux, and Docker Desktop.
#
# Both PG data and backup use Docker named volumes (codefreedom_pg_data,
# codefreedom_pg_backup) for cross-platform compatibility — no permission
# issues on Windows/macOS/Linux.  Backup files are extracted via
# `docker cp` from the running container during `cf manage admin backup`.
# The concrete Docker volume names are env-overridable so parallel test
# stacks can run without reusing another compose project's PG volumes.
# ───────────────────────────────────────────────────────────────────────────

services:
  litellm:
    image: ${LITELLM_IMAGE:-docker.io/nilayparikh/codefreedom:litellm-latest}
    container_name: ${LITELLM_CONTAINER_NAME:-litellm-codefreedom}
    restart: unless-stopped
    profiles:
      - litellm
      - all
    labels:
      "codefreedom.component": "litellm-proxy"
    command:
      - --config
      - /app/litellm-config/config.yaml
      - --port
      - "4000"
      - --host
      - "0.0.0.0"
    ports:
      - "${LITELLM_BIND_HOST:-0.0.0.0}:${LITELLM_PORT:-4000}:4000"
    extra_hosts:
      # Docker Desktop already provides host.docker.internal on macOS/Windows;
      # this host-gateway mapping gives Linux the same hostname so one compose
      # file works unchanged across all supported OSes.
      - host.docker.internal:host-gateway
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-codefreedom-local}
      LITELLM_LOG_LEVEL: ${LITELLM_LOG_LEVEL:-INFO}
      NO_DOCS: ${LITELLM_NO_DOCS:-True}
      NO_REDOC: ${LITELLM_NO_REDOC:-True}
      LITELLM_NUM_RETRIES: ${LITELLM_NUM_RETRIES:-5}
      LITELLM_RETRY_AFTER: ${LITELLM_RETRY_AFTER:-0}
      LITELLM_TIMEOUT_ERROR_RETRIES: ${LITELLM_TIMEOUT_ERROR_RETRIES:-5}
      LITELLM_RATE_LIMIT_ERROR_RETRIES: ${LITELLM_RATE_LIMIT_ERROR_RETRIES:-5}
      LITELLM_INTERNAL_ERROR_RETRIES: ${LITELLM_INTERNAL_ERROR_RETRIES:-5}
      LITELLM_JSON_LOGS: ${LITELLM_JSON_LOGS:-true}
      LITELLM_DROP_PARAMS: ${LITELLM_DROP_PARAMS:-true}
      LITELLM_REDACT_USER_API_KEY: ${LITELLM_REDACT_USER_API_KEY:-true}
      LITELLM_REQUIRE_AUTH_METRICS: ${LITELLM_REQUIRE_AUTH_METRICS:-false}
      LITELLM_TURN_OFF_MSG_LOGGING: ${LITELLM_TURN_OFF_MSG_LOGGING:-false}
      LITELLM_STREAM_USAGE: ${LITELLM_STREAM_USAGE:-true}
      SEARXNG_API_BASE: ${SEARXNG_API_BASE:-http://host.docker.internal:8500}
    networks:
      - codefreedom
    volumes:
      - ./config:/app/litellm-config
      - codefreedom_pg_data:/var/lib/postgresql/data
      - codefreedom_pg_backup:/var/lib/postgresql/backup

volumes:
  codefreedom_pg_data:
    name: ${CODEFREEDOM_PG_DATA_VOLUME:-codefreedom_pg_data}
  codefreedom_pg_backup:
    name: ${CODEFREEDOM_PG_BACKUP_VOLUME:-codefreedom_pg_backup}

networks:
  codefreedom:
    name: codefreedom
    external: true
