# ── CodeFreedom reasoning-efforts mapping v2 ────────────────────────────
# Rule-based reasoning-effort translation for the LiteLLM proxy.
#
# This file is a RULE LIBRARY. Each rule is a named, single-purpose
# transformation that a model references from its
# ``codefreedom.plugins.reasoning-efforts.rule`` field in the
# provider/model YAML.
#
# Two rule types:
#
#   mapping — maps reasoning-level strings from upstream apps
#   (Claude Code, Cursor, etc.) to values the downstream model
#   accepts.  The ``values`` dict is a direct incoming→outgoing map.
#   NO interpolation, NO clamping, NO guess.  If a value is missing
#   from ``values`` the field is dropped (warn-once).
#
#   thinking_budget — maps reasoning-level strings to a numeric
#   thinking-token budget.  The ``field`` is a dotted path
#   (e.g. ``extra_body.max_thinking_tokens``) that determines where
#   in the request the value gets set.  Applied on EVERY request.
#
# A model may be associated with exactly ONE rule (by name or inline).
# If a model has no rule the plugin does a pure field rename
# (``output_config.effort`` ↔ ``reasoning_effort``) — the ``auto``
# default.
#
# To reference a rule from a provider/model entry:
#
#     - model_name: DeepSeek/DeepSeek-V4-Pro
#       codefreedom:
#         plugins:
#           reasoning-efforts:
#             rule: deepseek-v4-pro       # ← name from this file
#
# You can also use INLINE rules directly in the provider/model YAML
# without a named rule — useful for one-off or test models:
#
#     - model_name: Local/my-experimental-model
#       codefreedom:
#         plugins:
#           reasoning-efforts:
#             type: mapping
#             output: reasoning_effort
#             values:
#               none: none
#               low: low
#               medium: high
#               high: high
#               xhigh: max
#               max: max
#
# Inline thinking_budget example:
#
#     - model_name: Local/llama-4
#       codefreedom:
#         plugins:
#           reasoning-efforts:
#             type: thinking_budget
#             field: extra_body.max_thinking_tokens
#             values:
#               none: 0
#               low: 256
#               medium: 1024
#               high: 4096
#               xhigh: 8192
#               max: 16384
#
# The plugin reads this file at
# ``~/.codefreedom/proxy/config/plugins/reasoning-efforts/reasoning-efforts-mapping.yaml``.
# ─────────────────────────────────────────────────────────────────────────────

rules:
  # ── DeepSeek V4 family ────────────────────────────────────────────────
  # DeepSeek's API accepts low/medium/high/xhigh/max.  Map Claude Code's
  # vocabulary (low/medium/high/xhigh/max) to what DeepSeek expects.

  deepseek-v4-pro:
    type: mapping
    output: reasoning_effort
    values:
      none: none
      low: low
      medium: high # DeepSeek collapses low/medium → high
      high: high
      xhigh: max # xhigh → DeepSeek "max"
      max: max

  deepseek-v4-flash:
    type: mapping
    output: reasoning_effort
    values:
      none: none
      low: high # Flash collapses low/medium → high
      medium: high
      high: high
      xhigh: high # Flash caps at high
      max: high

  # ── Azure / Microsoft Foundry (OpenAI gpt-5.4 family) ──────────────────

  azure-gpt-5-4:
    type: mapping
    output: reasoning_effort
    values:
      none: none
      low: low
      medium: medium
      high: xhigh # gpt-5.4 supports xhigh
      xhigh: xhigh
      max: xhigh

  azure-gpt-5-4-mini:
    type: mapping
    output: reasoning_effort
    values:
      none: none
      low: low
      medium: medium
      high: medium # capping: mini stops at medium
      xhigh: medium
      max: medium

  azure-gpt-5-4-nano:
