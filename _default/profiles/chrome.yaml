description: Chrome browser tool profile for codefreedom — configures container image,
  ports, data directory, and environment.
notes:
- The 'chrome' block defines all settings for 'codefreedom run tools chrome'.
- '''image'' is the Docker image to use — change to ''docker.io/nilayparikh/codefreedom:chrome-latest''
  for published builds. (Also available on ghcr.io/nilayparikh/codefreedom as a mirror.)'
- '''container_name'' is the Docker container name (persistent, restart unless-stopped).'
- '''port'' is the CDP debug port exposed to the host.'
- '''data_dir'' (optional) is the host path mounted to /data/chrome inside the container.'
- '  Default: $CODEFREEDOM_HOME/sandbox/tools/chrome.'
- '''env'' are environment variables forwarded to the container.'
chrome:
  image: docker.io/nilayparikh/codefreedom:chrome-latest
  container_name: codefreedom-tools-chrome
  port: 9222
  mcp_port: 9223
  mcp_path: /mcp
  env:
    CHROME_DEBUG_PORT: '9222'
    MCP_PORT: '9223'
