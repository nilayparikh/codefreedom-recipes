description: Pi Code profiles for codefreedom — Earendil's AI coding agent
  with 0-click proxy config, launched via CodeFreedom's proxy auto-config.
notes:
  - "'cf r ag pc' drives proxy auto-config: reads PROXY_BASE_URL and
    PROXY_API_KEY from profile env, fetches /v1/models, generates
    settings.json, and points PI_CONFIG_DIR at it."
  - "'default' is the base profile — all other profiles inherit from it."
  - "'bare' is standalone: minimal profile with no proxy config or sandbox."
  - "In sandbox mode (--sandbox), each profile gets its own isolated
    ~/.codefreedom/pi-code/sandbox/{profile}/ directory."
  - "sandbox_images maps to Docker image reference for --sandbox mode."
  - "Use sandbox.env to declare env vars that should only be forwarded in
    --sandbox mode."
  - "Use local.env to declare env vars that should only apply in native mode."
profiles:
  default:
    description:
      Base profile — Pi Code agent launched via CodeFreedom's proxy auto-config.
      PROXY_BASE_URL and PROXY_API_KEY drive settings.json generation.
    sandbox_images:
      default: docker.io/nilayparikh/codefreedom:pi-code-latest
    tools:
      - chrome
      - web
      - github
    env:
      # Proxy auto-config (consumed by cf r ag pc to generate settings.json)
      PROXY_BASE_URL: http://localhost:4000
      PROXY_API_KEY: ${LITELLM_MASTER_KEY}
      # Pi: disable auto-update checks
      PI_SKIP_VERSION_CHECK: "1"
      # Pi: default model (optional — overrides Pi's built-in default)
      PI_DEFAULT_MODEL: ""
    sandbox:
      env:
        IS_SANDBOX: "1"
        GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_PERSONAL_ACCESS_TOKEN}
        GH_TOKEN: ${GITHUB_PERSONAL_ACCESS_TOKEN}
  bare:
    description: "Standalone — minimal: no proxy config, no sandbox settings,
      no preferences. Just the pi binary."
    env:
      PI_SKIP_VERSION_CHECK: "1"
