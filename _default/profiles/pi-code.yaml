description: Pi Code profiles for codefreedom — Earendil's AI coding agent
  with extension-based proxy config, launched via CodeFreedom's launcher.
notes:
  - "'cf r ag pc' generates extensions/codefreedom.ts in the pi agent config dir.
    The extension uses pi.registerProvider() for dynamic model discovery
    from the proxy at startup. pi-mcp-adapter reads .mcp.json for MCP tools."
  - "'default' is the base profile — all other profiles inherit from it."
  - "'bare' is standalone: minimal profile with no proxy config or sandbox."
  - "In sandbox mode (--sandbox), each profile gets its own isolated
    ~/.codefreedom/pi-code/sandbox/{profile}/ directory."
  - "sandbox_images maps to Docker image reference for --sandbox mode."
  - "Use sandbox.env to declare env vars that should only be forwarded in
    --sandbox mode."
  - "Use local.env to declare env vars that should only apply in native mode."
  - "extensions are installed at runtime via 'pi install npm:<name>' before
    the agent starts. LSP servers are installed via npm/pip for pi-lens."
profiles:
  default:
    description:
      Base profile — Pi Code agent launched via CodeFreedom's launcher.
      Generates TypeScript extension for dynamic model discovery from proxy.
      pi-mcp-adapter handles MCP tool integration from .mcp.json.
    sandbox_images:
      default: docker.io/nilayparikh/codefreedom:pi-code-latest
    tools:
      - chrome
      - web
      - github
    env:
      PROXY_BASE_URL: http://localhost:4000
      PROXY_API_KEY: ${LITELLM_MASTER_KEY}
      PI_SKIP_VERSION_CHECK: "1"
      PI_DEFAULT_MODEL: ""
      PI_SHOW_ALIAS_MODELS: ""
    extensions:
      - pi-mcp-adapter
      - pi-lean-ctx
      - "@tintinweb/pi-subagents"
      - pi-lens
      - pi-simplify
      - "@gotgenes/pi-permission-system"
    lsp_servers:
      npm:
        - typescript-language-server
        - vscode-langservers-extracted
        - bash-language-server
      pip:
        - "python-lsp-server[all]"
        - ruff
    sandbox:
      env:
        IS_SANDBOX: "1"
        GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_PERSONAL_ACCESS_TOKEN}
        GH_TOKEN: ${GITHUB_PERSONAL_ACCESS_TOKEN}
  bare:
    description: "Standalone — minimal: no proxy config, no sandbox settings,
      no preferences. Just the pi binary."
    env:
      PI_SKIP_VERSION_CHECK: "1"
