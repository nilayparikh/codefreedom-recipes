description: >
      Pi Code profiles for codefreedom — Earendil's AI coding agent
      with extension-based proxy config, launched via CodeFreedom's
      launcher.
notes:
      - "'cf r ag pc' generates extensions/codefreedom.ts in the pi
        agent config dir. The extension uses pi.registerProvider()
        for dynamic model discovery from the proxy at startup.
        pi-mcp-adapter reads .mcp.json for MCP tools."
      - "'default' is the base profile — all other profiles inherit
        from it."
      - "'bare' is standalone: minimal profile with no proxy config."
      - "Use local.env to declare env vars that should only apply
        in native mode."
      - "Extensions are listed in settings.json with npm: prefix
        so pi auto-installs them at startup. lean-ctx binary is
        installed at first launch if needed."
profiles:
      default:
            description: >
                  Base profile — Pi Code agent launched via
                  CodeFreedom's launcher. Generates TypeScript
                  extension for dynamic model discovery from proxy.
                  pi-mcp-adapter handles MCP tool integration
                  from .mcp.json.
            tools:
                  - chrome
                  - web
                  - github
            env:
                  PROXY_BASE_URL: http://localhost:4000
                  PROXY_API_KEY: ${LITELLM_MASTER_KEY}
                  PI_SKIP_VERSION_CHECK: "1"
                  PI_DEFAULT_MODEL: "MiMo-V2.5"
                  PI_DEFAULT_THINKING_LEVEL: "medium"
                  PI_DEFAULT_PROVIDER: "codefreedom"
                  PI_SHOW_ALIAS_MODELS: ""
                  GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_PERSONAL_ACCESS_TOKEN}
                  GH_TOKEN: ${GITHUB_PERSONAL_ACCESS_TOKEN}
            extensions:
                  - pi-mcp-adapter
                  - pi-lean-ctx
                  - "@tintinweb/pi-subagents"
                  - pi-lens
                  - pi-simplify
                  - "@gotgenes/pi-permission-system"
                  - pi-workflow-agent
            lsp_servers:
                  npm:
                        - typescript-language-server
                        - vscode-langservers-extracted
                        - bash-language-server
                  pip:
                        - "python-lsp-server[all]"
                        - ruff
      bare:
            description: >
                  Standalone — minimal: no proxy config,
                  no preferences. Just the pi binary.
            env:
                  PI_SKIP_VERSION_CHECK: "1"
