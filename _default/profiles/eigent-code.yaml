description: Eigent profiles for codefreedom — multi-agent desktop workforce
  with 0-click proxy config via CAMEL framework.
notes:
  - "'cf r ag ec' drives proxy auto-config: reads PROXY_BASE_URL and
    PROXY_API_KEY from profile env, sets CAMEL framework env vars
    (OPENAI_API_KEY, OPENAI_BASE_URL, ANTHROPIC_API_KEY, ANTHROPIC_BASE_URL)
    to route through the CodeFreedom proxy."
  - "'default' is the base profile — all other profiles inherit from it."
  - "'bare' is standalone: minimal profile with no proxy config."
  - "Eigent is a desktop app (Electron + FastAPI), not a CLI tool.
    This profile configures proxy routing for the CAMEL framework."
  - "Use local.env to declare env vars that should only apply in native mode."
profiles:
  default:
    description:
      Base profile — Eigent desktop app launched via CodeFreedom's proxy auto-config.
      PROXY_BASE_URL and PROXY_API_KEY drive CAMEL framework env var generation.
    tools:
      - chrome
      - web
      - github
    env:
      # Proxy auto-config (consumed by cf r ag ec to set CAMEL env vars)
      PROXY_BASE_URL: http://localhost:4000
      PROXY_API_KEY: ${LITELLM_MASTER_KEY}
      # Eigent: disable cloud services for local-only operation
      VITE_USE_LOCAL_PROXY: "true"
      SERVER_URL: http://localhost:3001
      # Eigent: default model (optional, set to proxy model name)
      EIGENT_DEFAULT_MODEL: ""
  bare:
    description: "Standalone — minimal: no proxy config, no tools. Just Eigent."
    env: {}
  multi-agent:
    description: >
      Multi-agent workforce profile — optimized for complex multi-agent
      workflows with parallel execution. Enables all built-in agent workers.
    env:
      EIGENT_DEFAULT_MODEL: ""
