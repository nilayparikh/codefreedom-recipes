description: MiMoCode profiles for codefreedom — 0-click proxy auto-config with
  all models from the running LiteLLM proxy automatically available.
notes:
  - "In sandbox mode (--sandbox), each profile gets its own isolated
    ~/.codefreedom/mimo-code/sandbox/{profile}/ directory."
  - "'default' is the base profile — all other profiles inherit from it."
  - "'bare' is standalone: minimal profile with no model config, sandbox
    settings, or preferences."
  - "Proxy auto-config: on launch, mimo probes LITELLM_BASE_URL, fetches
    /v1/models, and generates a complete mimocode.json with all models."
  - "No API keys required in profiles — the proxy handles routing."
  - "sandbox_images maps to Docker image reference for --sandbox mode."
  - "Use sandbox.env to declare env vars that should only be forwarded in
    --sandbox mode."
  - "Use local.env to declare env vars that should only apply in native mode."
profiles:
  default:
    description:
      Base profile — 0-click proxy auto-config with all models from the
      running LiteLLM proxy. Other profiles inherit from this.
    sandbox_images:
      default: docker.io/nilayparikh/codefreedom:mimo-code
    tools:
      - web
    env:
      LITELLM_BASE_URL: http://localhost:4000
      PROXY_API_KEY: ${LITELLM_MASTER_KEY}
      MIMOCODE_DISABLE_AUTOUPDATE: "1"
      MIMOCODE_DISABLE_MODELS_FETCH: "1"
      MIMOCODE_DISABLE_CLAUDE_CODE: "1"
      MIMOCODE_MIMO_ONLY: "1"
    sandbox:
      env:
        IS_SANDBOX: "1"
        MIMOCODE_DISABLE_GIT: "0"
        GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_PERSONAL_ACCESS_TOKEN}
        GH_TOKEN: ${GH_TOKEN}
  bare:
    description: "Standalone — minimal: no model config, no proxy auto-config,
      no sandbox settings. Just the mimo binary."
    env:
      MIMOCODE_DISABLE_AUTOUPDATE: "1"
      MIMOCODE_DISABLE_CLAUDE_CODE: "1"
      MIMOCODE_MIMO_ONLY: "1"
