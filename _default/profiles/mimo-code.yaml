description: MiMoCode profiles for codefreedom — terminal-native AI coding agent
  with cross-session memory (fork of OpenCode), launched via CodeFreedom's
  proxy auto-config.
notes:
  - "'cf mimo' drives proxy auto-config: reads LITELLM_BASE_URL and
    PROXY_API_KEY from profile env, fetches /v1/models, generates
    mimocode.json, and points MIMOCODE_CONFIG at it."
  - "'default' is the base profile — all other profiles inherit from it."
  - "'bare' is standalone: minimal profile with no proxy config or sandbox."
  - "In sandbox mode (--sandbox), each profile gets its own isolated
    ~/.codefreedom/mimo-code/sandbox/{profile}/ directory."
  - "sandbox_images maps to Docker image reference for --sandbox mode."
  - "Use sandbox.env to declare env vars that should only be forwarded in
    --sandbox mode."
  - "Use local.env to declare env vars that should only apply in native mode."
profiles:
  default:
    description:
      Base profile — MiMoCode agent launched via CodeFreedom's proxy auto-config.
      LITELLM_BASE_URL and PROXY_API_KEY drive mimocode.json generation.
    sandbox_images:
      default: docker.io/nilayparikh/codefreedom:mimo-code
    tools:
      - chrome
      - web
      - github
    env:
      # Proxy auto-config (consumed by cf mimo to generate mimocode.json)
      LITELLM_BASE_URL: http://localhost:4000
      PROXY_API_KEY: ${LITELLM_MASTER_KEY}
      # MiMoCode: pure mimo mode, no Claude Code inheritance
      MIMOCODE_MIMO_ONLY: "1"
      # MiMoCode: disable auto-update checks (default true, explicit)
      MIMOCODE_DISABLE_AUTOUPDATE: "1"
      # MiMoCode: disable telemetry to remote
      MIMOCODE_ENABLE_ANALYSIS: "0"
    sandbox:
      env:
        IS_SANDBOX: "1"
        MIMOCODE_DISABLE_GIT: "0"
        GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_PERSONAL_ACCESS_TOKEN}
        GH_TOKEN: ${GH_TOKEN}
  bare:
    description: "Standalone — minimal: no proxy config, no sandbox settings,
      no preferences. Just the mimo binary."
    env:
      MIMOCODE_MIMO_ONLY: "1"
      MIMOCODE_DISABLE_AUTOUPDATE: "1"
      MIMOCODE_ENABLE_ANALYSIS: "0"
      MIMOCODE_PURE: "1"
  ui-ux:
    description: >
      UI/UX design profile — optimized for frontend development, visual
      design, and design system work. Enables question tool for interactive
      design feedback and image attachment support.
    env:
      MIMOCODE_MAX_PROMPT_IMAGES: "20"
      MIMOCODE_ENABLE_QUESTION_TOOL: "1"
      MIMOCODE_EXPERIMENTAL: "1"
