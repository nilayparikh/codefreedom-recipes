---
# ── Microsoft Foundry (Azure) Provider ────────────────────────────────────────
# Routes to Azure AI Foundry / Azure OpenAI deployments.
# Set MICROSOFT_FOUNDRY_API_BASE and MICROSOFT_FOUNDRY_API_KEY to enable.

# Reference:
# - https://azure.microsoft.com/en-us/pricing/details/azure-openai/
# - https://docs.fireworks.ai/serverless/pricing
# ──────────────────────────────────────────────────────────────────────────────

azure_api_params: &azure_api_params
  api_base: os.environ/MICROSOFT_FOUNDRY_API_BASE
  api_key: os.environ/MICROSOFT_FOUNDRY_API_KEY

azure_litellm_params: &azure_litellm_params
  drop_params: true
  timeout: 300
  extra_body:
    stream_options:
      include_usage: true

# Pay-per-token provider — slot 26 (see PROVIDER_ORDER.md).
azure_routing_params: &azure_routing_params
  cooldown_time: 60
  order: 26
  timeout: 300

# Base model_info block shared by all Azure/Foundry GPT models
azure_model_info: &azure_model_info
  db_model: false
  supports_reasoning: true
  mode: chat
  supports_system_messages: true
  supports_native_streaming: true
  supports_vision: true
  supported_openai_params:
    - tools
    - tool_choice
    - response_format
    - max_tokens
    - max_completion_tokens
    - stream
    - stream_options
    - temperature
    - top_p
    - stop
    - presence_penalty
    - frequency_penalty
    - logit_bias
    - logprobs
    - top_logprobs
    - reasoning_effort

model_list:
  # ── GPT-5.5 ─────────────────────────────────────────────────────────────────
  # Pricing per million tokens:
  # Input: $5.00  |  Cached Input: $0.50  |  Output: $30.00
  # Context: 1,050,000 tokens | Output limit: 128,000 tokens
  - model_name: GPT-5.5
    litellm_params:
      model: openai/gpt-5.5
      <<: [*azure_api_params, *azure_litellm_params, *azure_routing_params]
    model_info:
      id: "azure-gpt-5-5"
      <<: *azure_model_info
      input_cost_per_token: 0.00000500
      cached_input_cost_per_token: 0.00000050
      output_cost_per_token: 0.00003000
      context_window: 1050000
      max_tokens: 1050000
      max_input_tokens: 922000
      max_output_tokens: 128000
      limit:
        context: 1050000
        output: 128000
    codefreedom:
      plugins:
        reasoning-efforts:
          rule: gpt-5-5

  # ── GPT-5.4 ─────────────────────────────────────────────────────────────────
  # Pricing per million tokens:
  # Input: $2.50  |  Cached Input: $0.25  |  Output: $15.00
  - model_name: GPT-5.4
    litellm_params:
      model: openai/gpt-5.4
      <<: [*azure_api_params, *azure_litellm_params, *azure_routing_params]
    model_info:
      id: "azure-gpt-5-4"
      <<: *azure_model_info
      input_cost_per_token: 0.00000250
      cached_input_cost_per_token: 0.00000025
      output_cost_per_token: 0.00001500
      context_window: 1050000
      max_tokens: 1050000
      max_input_tokens: 922000
      max_output_tokens: 128000
      limit:
        context: 1050000
        output: 128000
    codefreedom:
      plugins:
        reasoning-efforts:
          rule: gpt-5-4

  # ── GPT-5.4-Mini ────────────────────────────────────────────────────────────
  # Pricing per million tokens:
  # Input: $1.00  |  Cached Input: $0.08  |  Output: $15.00
  - model_name: GPT-5.4-Mini
    litellm_params:
      model: openai/gpt-5.4-mini
      <<: [*azure_api_params, *azure_litellm_params, *azure_routing_params]
    model_info:
      id: "azure-gpt-5-4-mini"
      <<: *azure_model_info
      input_cost_per_token: 0.00000100
      cached_input_cost_per_token: 0.00000008
      output_cost_per_token: 0.00001500
      context_window: 400000
      max_tokens: 400000
      max_input_tokens: 272000
      max_output_tokens: 128000
      limit:
        context: 400000
        output: 128000
    codefreedom:
      plugins:
        reasoning-efforts:
          rule: gpt-5-4-mini

  # ── GPT-5.4-Nano ────────────────────────────────────────────────────────────
  # Pricing per million tokens:
  # Input: $0.80  |  Cached Input: $0.08  |  Output: $12.50
  - model_name: GPT-5.4-Nano
    litellm_params:
      model: openai/gpt-5.4-nano
      <<: [*azure_api_params, *azure_litellm_params, *azure_routing_params]
    model_info:
      id: "azure-gpt-5-4-nano"
      <<: *azure_model_info
      input_cost_per_token: 0.00000080
      cached_input_cost_per_token: 0.00000008
      output_cost_per_token: 0.00001250
      context_window: 400000
      max_tokens: 400000
      max_input_tokens: 272000
      max_output_tokens: 128000
      limit:
        context: 400000
        output: 128000
    codefreedom:
      plugins:
        reasoning-efforts:
          rule: gpt-5-4-nano
