# ── LiteLLM Example Configuration ─────────────────────────────────────────────

include:
  # ── Cloud providers ─────────────────────────────────────────────────────
  # Enabled by default — set the API key in .env.secrets to activate.
  # Leave the key empty and LiteLLM skips the provider automatically.
  - providers/deepseek.yaml
  - providers/opencode.yaml
  - providers/command-code.yaml

# ═══════════════════════════════════════════════════════════════════════════════
# General Settings
# ═══════════════════════════════════════════════════════════════════════════════
general_settings:
  # ── Database ─────────────────────────────────────────────────────────────
  store_model_in_db: true
  store_prompts_in_spend_logs: false

  # ── Forward Client Headers ───────────────────────────────────────────────
  forward_client_headers_to_llm_api: true

# ═══════════════════════════════════════════════════════════════════════════════
# Router Settings
# ═══════════════════════════════════════════════════════════════════════════════
router_settings:
  num_retries: 5
  retry_after: 0
  allowed_fails: 3

  # ── Model Group Aliases ──────────────────────────────────────────────────
  # Each alias maps to a model group. Override via the corresponding
  # LITELLM_MODEL_ALIAS_* env var in .env.
  #
  # | Model alias | Behavior |
  # |---|---|
  # | default | Special value that clears any model override and reverts to the recommended model for your account type. Not itself a model alias |
  # | best | Uses Fable 5 where your organization has access to it, otherwise the latest Opus model |
  # | fable | Uses Claude Fable 5 for your hardest and longest-running tasks |
  # | sonnet | Uses the latest Sonnet model for daily coding tasks |
  # | opus | Uses the latest Opus model for complex reasoning tasks |
  # | haiku | Uses the fast and efficient Haiku model for simple tasks |
  # | sonnet[1m] | Uses Sonnet with a 1 million token context window for long sessions |
  # | opus[1m] | Uses Opus with a 1 million token context window for long sessions |
  # | opusplan | Special mode that uses opus during plan mode, then switches to sonnet for execution |

  # ──────────────────────────────────────────────────────────────────────────
  model_group_alias:
    "best": os.environ/LITELLM_MODEL_ALIAS_BEST
    "fable": os.environ/LITELLM_MODEL_ALIAS_FABLE
    "sonnet": os.environ/LITELLM_MODEL_ALIAS_SONNET
    "opus": os.environ/LITELLM_MODEL_ALIAS_OPUS
    "haiku": os.environ/LITELLM_MODEL_ALIAS_HAIKU
    "sonnet[1m]": os.environ/LITELLM_MODEL_ALIAS_SONNET_1M
    "opus[1m]": os.environ/LITELLM_MODEL_ALIAS_OPUS_1M
    "opusplan": os.environ/LITELLM_MODEL_ALIAS_OPUSPLAN
    "custom": os.environ/LITELLM_MODEL_ALIAS_CUSTOM

  # ── Retry Policy ─────────────────────────────────────────────────────────
  retry_policy:
    AuthenticationErrorRetries: 0 # never retry bad credentials
    TimeoutErrorRetries: os.environ/LITELLM_TIMEOUT_ERROR_RETRIES
    RateLimitErrorRetries: os.environ/LITELLM_RATE_LIMIT_ERROR_RETRIES
    ContentPolicyViolationErrorRetries: 0 # never retry content violations
    InternalServerErrorRetries: os.environ/LITELLM_INTERNAL_ERROR_RETRIES

# ═══════════════════════════════════════════════════════════════════════════════
# LiteLLM Settings
# ═══════════════════════════════════════════════════════════════════════════════
litellm_settings:
  always_include_stream_usage: os.environ/LITELLM_STREAM_USAGE
  drop_params: os.environ/LITELLM_DROP_PARAMS
  redact_user_api_key_info: os.environ/LITELLM_REDACT_USER_API_KEY
  turn_off_message_logging: os.environ/LITELLM_TURN_OFF_MSG_LOGGING
  json_logs: os.environ/LITELLM_JSON_LOGS

  modify_params: true

  # Translate Anthropic /v1/messages format to OpenAI for non-Anthropic backends
  use_chat_completions_url_for_anthropic_messages: true

  # Expose Prometheus metrics at /metrics/
  callbacks:
    - prometheus
    - websearch_interception
    - plugins.reasoning-efforts.reasoning_efforts_mapping.instance
    - plugins.image-router.image_router.instance

  websearch_interception_params:
    enabled_providers:
      [
        "openai",
        "anthropic",
        "vertex_ai",
        "bedrock",
        "azure",
        "deepseek",
        "nvidia",
        "opencode-zen",
        "openrouter",
        "minimax",
      ]
  search_tool_name: codefreedom-web

  # Require auth for the /metrics/ endpoint (set to true for production)
  require_auth_for_metrics_endpoint: os.environ/LITELLM_REQUIRE_AUTH_METRICS

# ═══════════════════════════════════════════════════════════════════════════════
# Web Search Bridge — SearXNG-shaped provider for the Camoufox MCP
# ═══════════════════════════════════════════════════════════════════════════════
# Uncomment this entire block to make LiteLLM's websearch_interception
# callback route every Claude Code WebSearch to the local web-bridge, which
# in turn calls the Camoufox MCP web_search tool. See
# docs/proxy/websearch-interception.md.

# ═══════════════════════════════════════════════════════════════════════════════
# CodeFreedom Plugins
# ═══════════════════════════════════════════════════════════════════════════════
codefreedom:
  image-router-for-text-only:
    enabled: true
    models:
      - "OpenCode/MiMo-V2.5-FREE"
      - "OpenCode/Kimi-K2.6"
      - "OpenCode/Qwen3.7-Max"

search_tools:
  - search_tool_name: codefreedom-web
    litellm_params:
      search_provider: searxng
      api_base: http://web-bridge:8500
