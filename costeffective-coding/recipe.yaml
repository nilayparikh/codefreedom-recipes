# yaml-language-server: $schema=https://raw.githubusercontent.com/nilayparikh/codefreedom/recipe-branch/schema/recipe.schema.json
---
# ── Recipe: costeffective-coding ────────────────────────────────────────────────────────
# Coding configuration recipe — profiles, proxy config, and env files
# for cloud providers (DeepSeek, Azure, OpenCode, OpenRouter)
# routing through a LiteLLM proxy.
# ──────────────────────────────────────────────────────────────────────────────

name: costeffective-coding
description: "Cloud inference — DeepSeek, Azure, OpenCode, OpenRouter via LiteLLM proxy"
version: 1

vars:
  LITELLM_PORT: "4000"
  LITELLM_BIND_HOST: "127.0.0.1"
  PROXY_BASE_URL: "http://${LITELLM_BIND_HOST}:${LITELLM_PORT}"
  TOOL_IMAGE_BASE: "docker.io/nilayparikh/codefreedom"
  CHROME_IMAGE_TAG: "latest"
  WEB_IMAGE_TAG: "latest"
  GITHUB_IMAGE_TAG: "latest"
  WEB_BRIDGE_IMAGE_TAG: "latest"
  AGENT_IMAGE: "docker.io/nilayparikh/codefreedom:ubuntu-dev-0.2.2rc1.dev1"
  AGENT_CUDA_IMAGE: "docker.io/nilayparikh/codefreedom:cuda-dev-0.2.2rc1.dev1"
  AGENT_ROCM_IMAGE: "docker.io/nilayparikh/codefreedom:rocm-dev-0.2.2rc1.dev1"
  CHROME_CDP_PORT: "9222"
  CHROME_MCP_PORT: "9223"
  GITHUB_MCP_PORT: "8129"
  WEB_MCP_PORT: "8420"
  WEB_BRIDGE_PORT: "8500"
  MICROSOFT_FOUNDRY_API_BASE: ""
  OPENCODE_ZEN_BASE_URL: "https://opencode.ai/zen/v1"
  OPENCODE_GO_BASE_URL: "https://opencode.ai/zen/go/v1"
  OPENCODE_GO_ANTHROPIC_BASE_URL: "https://opencode.ai/zen/go"
  OPENROUTER_BASE_URL: "https://openrouter.ai/api/v1"
files:
  # ── Unified profiles (single file) ──────────────────────────────────
  - path: profiles.yaml
    target: profiles.yaml
    merge: deepdiff

  # ── Proxy config (copy entire directory) ──────────────────────────────
  - path: proxy
    target: proxy/
    copy_dir: true

  # ── Setup scripts ──────────────────────────────────────────────────────
  - path: scripts/setup-secrets.sh
    target: scripts/costeffective-coding/setup-secrets.sh
  - path: scripts/setup-secrets.ps1
    target: scripts/costeffective-coding/setup-secrets.ps1

dirs: []
  # PG data and backup both use Docker named volumes — no host
  # directories are needed.

generated_artifacts:
  - kind: setup_script_bash
    target: scripts/costeffective-coding/setup-secrets.sh
  - kind: setup_script_powershell
    target: scripts/costeffective-coding/setup-secrets.ps1

required_secrets:
  - var: PROXY_API_KEY
    prompt: "Proxy API key"
    hint: "Run: openssl rand -hex 32  (default: sk-codefreedom-local)"
    default: "sk-codefreedom-local"
    env: "${CF_CLI_PROXY_API_KEY:-sk-codefreedom-local}"
  - var: MICROSOFT_FOUNDRY_API_KEY
    prompt: "Azure Foundry API key"
    hint: "Set in Azure AI Foundry portal"
    env: "${CF_CLI_MICROSOFT_FOUNDRY_API_KEY:-}"
  - var: OPENCODE_ZEN_API_KEY
    prompt: "OpenCode Zen API key"
    hint: "Get key from OpenCode dashboard"
    env: "${CF_CLI_OPENCODE_ZEN_API_KEY:-}"
  - var: OPENROUTER_API_KEY
    prompt: "OpenRouter API key"
    hint: "Get key at https://openrouter.ai/keys"
    env: "${CF_CLI_OPENROUTER_API_KEY:-}"
  - var: GITHUB_PERSONAL_ACCESS_TOKEN
    prompt: "GitHub personal access token"
    hint: "Get key at https://github.com/settings/tokens"
    env: "${CF_CLI_GITHUB_PERSONAL_ACCESS_TOKEN:-}"

config_vars:
  - var: MICROSOFT_FOUNDRY_API_BASE
    prompt: "Azure Foundry base URL"
    hint: "Azure AI Foundry workspace endpoint"
    env: "${CF_CLI_MICROSOFT_FOUNDRY_API_BASE:-}"

advice: |
  For interactive secret setup (recommended), run the assisted script:
    Bash:       bash {cf_dir}/scripts/costeffective-coding/setup-secrets.sh
    PowerShell: {cf_dir}\scripts\costeffective-coding\setup-secrets.ps1
  The script sets CF_CLI_* machine environment variables, persists them
  in your shell profile, and reports which services are configured.
