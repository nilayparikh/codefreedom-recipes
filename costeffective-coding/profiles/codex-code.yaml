description: Codex profiles for codefreedom — OpenAI's coding agent launched via
  CodeFreedom's proxy auto-config.
notes:
  - "'cf r ag cx' drives proxy auto-config: reads PROXY_BASE_URL and
    PROXY_API_KEY from profile env, generates config.toml, and points
    CODEX_HOME at it."
  - "'default' is the base profile."
  - "'bare' is standalone: minimal profile with no proxy config or sandbox."
  - "In sandbox mode (--sandbox), each profile gets its own isolated
    ~/.codefreedom/codex-code/sandbox/{profile}/ directory."
  - "sandbox_images maps to Docker image reference for --sandbox mode."
  - "Use sandbox.env to declare env vars that should only be forwarded in
    --sandbox mode."
  - "Use local.env to declare env vars that should only apply in native mode."
profiles:
  default:
    description:
      Base profile — Codex agent launched via CodeFreedom's proxy auto-config.
      PROXY_BASE_URL and PROXY_API_KEY drive config.toml generation.
    sandbox_images:
      default: docker.io/nilayparikh/codefreedom:ubuntu-latest
      cuda: docker.io/nilayparikh/codefreedom:cuda-latest
      rocm: docker.io/nilayparikh/codefreedom:rocm-latest
    tools:
      - chrome
      - web
      - github
    env:
      # Proxy auto-config (consumed by cf r ag cx to generate config.toml)
      PROXY_BASE_URL: http://localhost:4000
      PROXY_API_KEY: ${LITELLM_MASTER_KEY}
      # Codex: default model for proxy routing
      CODEX_DEFAULT_MODEL: ""
    sandbox:
      env:
        IS_SANDBOX: "1"
        GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_PERSONAL_ACCESS_TOKEN}
        GH_TOKEN: ${GITHUB_PERSONAL_ACCESS_TOKEN}
  bare:
    description: "Standalone — minimal: no proxy config, no sandbox settings.
      Just the codex binary."
    env: {}
