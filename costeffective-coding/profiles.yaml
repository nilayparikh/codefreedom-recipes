# ═══════════════════════════════════════════════════════════════════════════════
# Common settings shared by all agents and tools
# ═══════════════════════════════════════════════════════════════════════════════
common:
  # Proxy
  proxy:
    bind_host: ${LITELLM_BIND_HOST:-127.0.0.1}
    bind_port: ${LITELLM_PORT:-4000}
    env:
      PROXY_BASE_URL: ${PROXY_BASE_URL}
      PROXY_API_KEY: ${LITELLM_MASTER_KEY}

# ═══════════════════════════════════════════════════════════════════════════════
# Agent profiles
# ═══════════════════════════════════════════════════════════════════════════════
agents:
  # ── Claude Code ────────────────────────────────────────────────────────────
  claude-code:
    profiles:
      default:
        env:
          ANTHROPIC_BASE_URL: ${PROXY_BASE_URL}
          ANTHROPIC_AUTH_TOKEN: ${LITELLM_MASTER_KEY}
          CLAUDE_MODEL: MiMo-V2.5
          ANTHROPIC_DEFAULT_FABLE_MODEL: GPT-5.4
          ANTHROPIC_DEFAULT_FABLE_MODEL_NAME: GPT-5.4
          ANTHROPIC_DEFAULT_OPUS_MODEL: GLM-5.2
          ANTHROPIC_DEFAULT_OPUS_MODEL_NAME: GLM-5.2
          ANTHROPIC_DEFAULT_SONNET_MODEL: MiMo-V2.5-Pro
          ANTHROPIC_DEFAULT_SONNET_MODEL_NAME: MiMo-V2.5-Pro
          ANTHROPIC_DEFAULT_HAIKU_MODEL: MiMo-V2.5
          ANTHROPIC_DEFAULT_HAIKU_MODEL_NAME: MiMo-V2.5
          ANTHROPIC_CUSTOM_MODEL_OPTION: MiMo-V2.5
          ANTHROPIC_CUSTOM_MODEL_OPTION_NAME: MiMo-V2.5
          CLAUDE_CODE_ENABLE_GATEWAY_MODEL_DISCOVERY: "1"
          CLAUDE_CODE_ATTRIBUTION_HEADER: "0"
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
          CLAUDE_CODE_IDE_SKIP_AUTO_INSTALL: "1"
          CLAUDE_CODE_AUTO_CONNECT_IDE: "false"
          CLAUDE_CODE_DISABLE_OFFICIAL_MARKETPLACE_AUTOINSTALL: "1"
          CLAUDE_CODE_DISABLE_EXPERIMENTAL_BETAS: "1"
          DISABLE_INSTALLATION_CHECKS: "1"
      bare:
        env:
          ANTHROPIC_BASE_URL: ${PROXY_BASE_URL}
          ANTHROPIC_AUTH_TOKEN: ${LITELLM_MASTER_KEY}
          CLAUDE_CODE_ENABLE_GATEWAY_MODEL_DISCOVERY: "1"
          CLAUDE_CODE_ATTRIBUTION_HEADER: "0"
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
          CLAUDE_CODE_IDE_SKIP_AUTO_INSTALL: "1"
          CLAUDE_CODE_AUTO_CONNECT_IDE: "false"
          CLAUDE_CODE_DISABLE_OFFICIAL_MARKETPLACE_AUTOINSTALL: "1"
          CLAUDE_CODE_DISABLE_EXPERIMENTAL_BETAS: "1"
          DISABLE_INSTALLATION_CHECKS: "1"
      ui-ux:
        env:
          CLAUDE_MODEL: MiMo-V2.5
          ANTHROPIC_DEFAULT_FABLE_MODEL: GPT-5.4
          ANTHROPIC_DEFAULT_FABLE_MODEL_NAME: GPT-5.4
          ANTHROPIC_DEFAULT_OPUS_MODEL: GLM-5.2
          ANTHROPIC_DEFAULT_OPUS_MODEL_NAME: GLM-5.2
          ANTHROPIC_DEFAULT_SONNET_MODEL: MiMo-V2.5-Pro
          ANTHROPIC_DEFAULT_SONNET_MODEL_NAME: MiMo-V2.5-Pro
          ANTHROPIC_DEFAULT_HAIKU_MODEL: MiMo-V2.5
          ANTHROPIC_DEFAULT_HAIKU_MODEL_NAME: MiMo-V2.5
          ANTHROPIC_CUSTOM_MODEL_OPTION: MiMo-V2.5
          ANTHROPIC_CUSTOM_MODEL_OPTION_NAME: MiMo-V2.5
          CLAUDE_CODE_ENABLE_GATEWAY_MODEL_DISCOVERY: "1"
          CLAUDE_CODE_ATTRIBUTION_HEADER: "0"
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
          CLAUDE_CODE_IDE_SKIP_AUTO_INSTALL: "1"
          CLAUDE_CODE_AUTO_CONNECT_IDE: "false"
          CLAUDE_CODE_DISABLE_OFFICIAL_MARKETPLACE_AUTOINSTALL: "1"
          CLAUDE_CODE_DISABLE_EXPERIMENTAL_BETAS: "1"
          DISABLE_INSTALLATION_CHECKS: "1"

  # ── MiMo Code ─────────────────────────────────────────────────────────────
  mimo-code:
    profiles:
      default:
        env:
          MIMOCODE_MIMO_ONLY: "1"
          MIMOCODE_DISABLE_AUTOUPDATE: "1"
          MIMOCODE_DISABLE_CLAUDE_CODE: "1"
      bare:
        env:
          MIMOCODE_MIMO_ONLY: "1"
          MIMOCODE_DISABLE_AUTOUPDATE: "1"
          MIMOCODE_DISABLE_CLAUDE_CODE: "1"
          MIMOCODE_PURE: "1"
      ui-ux:
        env:
          MIMOCODE_MAX_PROMPT_IMAGES: "20"
          MIMOCODE_ENABLE_QUESTION_TOOL: "1"
          MIMOCODE_EXPERIMENTAL: "1"

  # ── Open Code ─────────────────────────────────────────────────────────────
  open-code:
    profiles:
      default:
        env:
          OPENCODE_DISABLE_AUTOUPDATE: "1"
          OPENCODE_DISABLE_CLAUDE_CODE: "1"
      bare:
        env:
          OPENCODE_DISABLE_AUTOUPDATE: "1"
          OPENCODE_DISABLE_CLAUDE_CODE: "1"
          OPENCODE_PURE: "1"
      ui-ux:
        env:
          OPENCODE_EXPERIMENTAL: "1"

  # ── Codex Code ────────────────────────────────────────────────────────────
  codex-code:
    profiles:
      default:
        env:
          CODEX_DEFAULT_MODEL: MiMo-V2.5
      bare:
        env: {}

  # ── Pi Code ───────────────────────────────────────────────────────────────
  pi-code:
    profiles:
      default:
        env:
          PI_DEFAULT_MODEL: "MiMo-V2.5-Pro"
          PI_DEFAULT_THINKING_LEVEL: "high"
          PI_DEFAULT_PROVIDER: "codefreedom"
          GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_PERSONAL_ACCESS_TOKEN}
          GH_TOKEN: ${GITHUB_PERSONAL_ACCESS_TOKEN}
        extensions:
          - pi-mcp-adapter
          - pi-lean-ctx
          - "@tintinweb/pi-subagents"
          - pi-lens
          - pi-simplify
          - "@gotgenes/pi-permission-system"
          - pi-workflow-agent
        lsp_servers:
          npm:
            - typescript-language-server
            - vscode-langservers-extracted
            - bash-language-server
          pip:
            - "python-lsp-server[all]"
            - ruff
      bare:
        env:
          PI_SKIP_VERSION_CHECK: "1"

# ═══════════════════════════════════════════════════════════════════════════════
# Tool profiles
# ═══════════════════════════════════════════════════════════════════════════════
tools:
  chrome:
    image: ${TOOL_IMAGE_BASE}:chrome-${CHROME_IMAGE_TAG}
    container_name: codefreedom-tools-chrome
    port: ${CHROME_CDP_PORT:-9222}
    mcp_port: ${CHROME_MCP_PORT:-9223}
    mcp_path: /mcp
    env:
      CHROME_DEBUG_PORT: "${CHROME_CDP_PORT:-9222}"
      MCP_PORT: "${CHROME_MCP_PORT:-9223}"

  web:
    image: ${TOOL_IMAGE_BASE}:web-${WEB_IMAGE_TAG}
    container_name: codefreedom-web
    port: ${WEB_MCP_PORT:-8420}
    env: {}
    search_cooldown_seconds: 10.0
    search_engines:
      search_engine1:
        url: https://search.brave.com/search?q={q}
        parser: standard
      search_engine2:
        url: https://www.bing.com/search?q={q}&form=QBLH
        parser: standard
    parser_registry:
      standard:
        result_selectors: "[data-type='web'], .b_algo, #res .g, .result, .search-result, li:has(h2 a[href]), li:has(h3 a[href])"
        link_selector: h2 a[href], h3 a[href], a[href]
        snippet_selectors: .b_caption p, .b_lineclamp2, .generic-snippet .content, .snippet, .description, .st, span.st
        ai_selectors:
          - .chatllm-content
          - .b_ans
          - .rai_content
          - "[data-attrid='wa_description']"
          - .knowledge-panel

  github:
    image: ${TOOL_IMAGE_BASE}:github-${GITHUB_IMAGE_TAG}
    container_name: codefreedom-tools-github
    port: ${GITHUB_MCP_PORT:-8129}
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_PERSONAL_ACCESS_TOKEN}

  web-bridge:
    image: ${TOOL_IMAGE_BASE}:web-bridge-${WEB_BRIDGE_IMAGE_TAG}
    container_name: codefreedom-web-bridge
    port: ${WEB_BRIDGE_PORT:-8500}
    env:
      MCP_WEB_URL: ${MCP_WEB_URL:-http://host.docker.internal:${WEB_MCP_PORT:-8420}/mcp}
      WEB_BRIDGE_COOLDOWN_SECONDS: "${WEB_BRIDGE_COOLDOWN_SECONDS:-2.0}"
      MCP_TIMEOUT_SECONDS: "${MCP_TIMEOUT_SECONDS:-60}"

  git:
    model: "MiMo-V2.5"
    conventional_commit: true
    signed_commit: true
    templates:
      commit_message: "${type}(${scope}): ${description}"
      pr_title: "${type}(${scope}): ${description}"
      pr_description: |
        ## Summary
        ${summary}

        ## Changes
        ${changes}

        ## Testing
        ${testing}
